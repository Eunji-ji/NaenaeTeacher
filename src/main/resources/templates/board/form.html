<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title th:text="${editMode}?'게시글 수정 | NaenaeTeacher':'게시글 등록 | NaenaeTeacher'">게시글 등록</title><link rel="stylesheet" href="/assets/css/naenae-dashboard.css"></head>
<body class="naenae-dashboard-body"><div class="dashboard-shell"><th:block th:if="${teacherView}"><aside th:replace="~{fragments/teacher-sidebar :: sidebar('board')}"></aside></th:block><th:block th:unless="${teacherView}"><aside th:replace="~{fragments/student-sidebar :: sidebar('board')}"></aside></th:block>
<div class="dashboard-main"><header class="dashboard-header"><div><p class="header-kicker">Board Editor</p><h1 class="header-title" th:text="${editMode}?'게시글 수정':'게시글 등록'">게시글 등록</h1></div><a class="header-nav-action header-nav-action-secondary" th:href="${editMode ? basePath + '/' + postId : basePath}">취소</a></header>
<main class="dashboard-content"><section class="dashboard-card assignment-editor-card board-editor-card"><div class="auth-alert error" th:if="${errorMessage}" th:text="${errorMessage}"></div>
<form id="boardForm" th:action="${editMode ? basePath + '/' + postId : basePath}" method="post" enctype="multipart/form-data"><input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
<div class="field-group"><label for="boardTitle">제목</label><input id="boardTitle" name="title" type="text" maxlength="200" placeholder="제목을 입력하세요" th:value="${title}" required></div>
<div class="field-group"><label>내용</label><div class="editor-shell"><div class="editor-toolbar" role="toolbar"><button type="button" data-command="bold"><b>B</b></button><button type="button" data-command="italic"><i>I</i></button><button type="button" data-command="underline"><u>U</u></button><button type="button" data-command="insertUnorderedList">• 목록</button><button type="button" data-command="insertOrderedList">1. 목록</button><button type="button" data-command="justifyCenter">가운데</button></div><div id="boardEditor" class="assignment-editor board-editor" contenteditable="true" data-placeholder="내용을 입력하세요."></div><input id="contentHtml" name="contentHtml" type="hidden"></div></div>
<div class="field-group" th:if="${!#lists.isEmpty(existingAttachments)}"><label>기존 첨부파일</label><div class="assignment-download-list"><a class="assignment-download-item" th:each="file:${existingAttachments}" th:href="${basePath + '/' + postId + '/attachments/' + file.id() + '/download'}"><span>↓</span><strong th:text="${file.originalName()}">파일명</strong><small th:text="${file.fileSizeLabel()}">크기</small></a></div></div>
<div class="field-group"><label for="attachments">첨부파일 <span class="field-note">기존 파일 포함 최대 5개 · 파일당 10MB</span></label><label class="attachment-dropzone" for="attachments"><span class="attachment-icon">＋</span><strong>파일을 선택하세요.</strong><small>여러 파일을 한 번에 등록할 수 있어요.</small></label><input id="attachments" name="attachments" type="file" multiple hidden><div id="attachmentList" class="attachment-list"></div></div>
<div class="word-test-form-actions"><a class="bulk-action bulk-download" th:href="${editMode ? basePath + '/' + postId : basePath}">취소</a><button class="bulk-action bulk-upload" type="submit" th:text="${editMode}?'게시글 수정':'게시글 등록'">등록</button></div></form></section></main></div></div>
<script th:inline="javascript">const editor=document.getElementById('boardEditor');editor.innerHTML=/*[[${contentHtml}]]*/'';document.querySelectorAll('[data-command]').forEach(b=>b.onclick=()=>{document.execCommand(b.dataset.command,false,null);editor.focus();});const input=document.getElementById('attachments'),list=document.getElementById('attachmentList'),existing=/*[[${#lists.size(existingAttachments)}]]*/0;input.addEventListener('change',()=>{if(existing+input.files.length>5){alert('첨부파일은 기존 파일을 포함해 최대 5개입니다.');input.value='';}list.textContent=[...input.files].map(f=>f.name).join(', ');});document.getElementById('boardForm').addEventListener('submit',()=>document.getElementById('contentHtml').value=editor.innerHTML);</script><script src="/assets/js/mobile-navigation.js" defer></script></body></html>
