<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>게시글 상세 | NaenaeTeacher</title><link rel="stylesheet" href="/assets/css/naenae-dashboard.css"></head>
<body class="naenae-dashboard-body"><div class="dashboard-shell"><th:block th:if="${teacherView}"><aside th:replace="~{fragments/teacher-sidebar :: sidebar('board')}"></aside></th:block><th:block th:unless="${teacherView}"><aside th:replace="~{fragments/student-sidebar :: sidebar('board')}"></aside></th:block>
<div class="dashboard-main"><header class="dashboard-header"><div><p class="header-kicker">Board Detail</p><h1 class="header-title">게시글 상세</h1></div><div class="header-actions"><a class="header-nav-action header-nav-action-secondary" th:href="${basePath}">목록</a><a class="header-nav-action" th:if="${post.canEdit()}" th:href="${basePath + '/' + post.id() + '/edit'}">수정</a></div></header>
<main class="dashboard-content"><div class="auth-alert success" th:if="${successMessage}" th:text="${successMessage}"></div><article class="dashboard-card board-detail-panel">
<header class="board-detail-header"><h2 th:text="${post.title()}">제목</h2><div class="board-detail-meta"><span th:text="${post.authorLabel()}">작성자</span><time th:text="${#temporals.format(post.createdAt(),'yyyy.MM.dd HH:mm')}">작성일</time><span th:text="|조회 ${post.viewCount()}|">조회 0</span></div></header>
<div class="board-detail-content" th:utext="${post.contentHtml()}">내용</div>
<section class="board-file-section" th:if="${!#lists.isEmpty(post.attachments())}"><h3 th:text="|첨부파일 ${#lists.size(post.attachments())}개|">첨부파일</h3><div class="assignment-download-list"><a class="assignment-download-item" th:each="file:${post.attachments()}" th:href="${basePath + '/' + post.id() + '/attachments/' + file.id() + '/download'}"><span>↓</span><strong th:text="${file.originalName()}">파일</strong><small th:text="${file.fileSizeLabel()}">크기</small></a></div></section>
<footer class="board-detail-actions"><a class="notice-action-link edit" th:if="${post.canEdit()}" th:href="${basePath + '/' + post.id() + '/edit'}">수정</a><form th:if="${post.canDelete()}" th:action="${basePath + '/' + post.id() + '/delete'}" method="post" onsubmit="return confirm('이 게시글을 삭제할까요?');"><input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"><button class="notice-action-link delete" type="submit">삭제</button></form></footer>
</article>
<section class="dashboard-card board-comment-panel"><div class="board-comment-heading"><h2>댓글 <strong th:text="${#lists.size(post.comments())}">0</strong></h2><p>서로를 배려하는 따뜻한 댓글을 남겨주세요.</p></div><div class="auth-alert error" th:if="${commentError}" th:text="${commentError}"></div>
<form class="board-comment-form" th:action="${basePath + '/' + post.id() + '/comments'}" method="post"><input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"><textarea name="content" maxlength="1000" rows="3" placeholder="댓글을 입력하세요." required></textarea><button type="submit">댓글 등록</button></form>
<div class="board-comment-list" th:if="${!#lists.isEmpty(post.comments())}"><article class="board-comment-item" th:each="comment:${post.comments()}"><div class="board-comment-avatar" aria-hidden="true">N</div><div class="board-comment-body"><div class="board-comment-meta"><strong th:text="${comment.authorLabel()}">작성자</strong><time th:text="${#temporals.format(comment.createdAt(),'yyyy.MM.dd HH:mm')}">작성일</time></div><p th:text="${comment.content()}">댓글</p></div><form th:if="${comment.canDelete()}" th:action="${basePath + '/' + post.id() + '/comments/' + comment.id() + '/delete'}" method="post" onsubmit="return confirm('이 댓글을 삭제할까요?');"><input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"><button class="board-comment-delete" type="submit">삭제</button></form></article></div><div class="empty-state" th:if="${#lists.isEmpty(post.comments())}">첫 댓글을 남겨보세요.</div>
</section></main></div></div><script src="/assets/js/mobile-navigation.js" defer></script></body></html>
