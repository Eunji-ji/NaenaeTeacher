<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<body>
<aside class="dashboard-sidebar" th:fragment="sidebar(activeMenu)" aria-label="선생님 메뉴">
    <a class="brand profile-brand" href="/teacher/mypage" aria-label="마이페이지로 이동">
        <span class="brand-mark"><img th:if="${teacherHasProfileImage}" src="/teacher/mypage/profile-image" alt=""><span th:unless="${teacherHasProfileImage}">N</span></span>
        <div>
            <p class="brand-name" th:text="${teacherDisplayName}">선생님</p>
            <p class="brand-role">Teacher Space</p>
        </div>
    </a>
    <nav class="sidebar-nav">
        <a class="nav-item" th:classappend="${activeMenu == 'dashboard'} ? ' active'" href="/teacher/dashboard">
            <span class="nav-icon">▦</span> 대시보드
        </a>
        <div class="sidebar-section" aria-label="학생관리">
            <div class="sidebar-section-label"><span class="nav-icon">●</span> 학생관리</div>
            <div class="sidebar-subnav">
                <a class="sidebar-subitem" th:classappend="${activeMenu == 'courses'} ? ' active'" href="/teacher/courses">반등록</a>
                <a class="sidebar-subitem" th:classappend="${activeMenu == 'students'} ? ' active'" href="/teacher/students">학생등록</a>
                <a class="sidebar-subitem" th:classappend="${activeMenu == 'studentBulk'} ? ' active'" href="/teacher/students/bulk">학생일괄등록</a>
                <a class="sidebar-subitem" th:classappend="${activeMenu == 'attendance'} ? ' active'" href="/teacher/attendance">출석관리</a>
                <a class="sidebar-subitem" th:classappend="${activeMenu == 'studentStatus'} ? ' active'" href="/teacher/students/status">학생 학습관리</a>
            </div>
        </div>
        <div class="sidebar-section" aria-label="과제관리">
            <div class="sidebar-section-label"><span class="nav-icon">▣</span> 과제관리</div>
            <div class="sidebar-subnav">
                <a class="sidebar-subitem" th:classappend="${activeMenu == 'wordTests'} ? ' active'" href="/teacher/word-tests">단어시험</a>
                <a class="sidebar-subitem" th:classappend="${activeMenu == 'assignments'} ? ' active'" href="/teacher/assignments">과제등록</a>
            </div>
        </div>
        <div class="sidebar-section" aria-label="수업관리">
            <div class="sidebar-section-label"><span class="nav-icon">▤</span> 수업관리</div>
            <div class="sidebar-subnav">
                <a class="sidebar-subitem" th:classappend="${activeMenu == 'classProgress'} ? ' active'" href="/teacher/classes/progress">진도관리</a>
                <a class="sidebar-subitem" th:classappend="${activeMenu == 'classSchedule'} ? ' active'" href="/teacher/classes/schedule">시간표</a>
            </div>
        </div>
        <div class="sidebar-section" aria-label="오늘의 영어">
            <div class="sidebar-section-label"><span class="nav-icon">Aa</span> 오늘의 영어</div>
            <div class="sidebar-subnav">
                <a class="sidebar-subitem" th:classappend="${activeMenu == 'todayEnglishUpload'} ? ' active'" href="/teacher/today-english">단어등록</a>
                <a class="sidebar-subitem" th:classappend="${activeMenu == 'todayEnglishWords'} ? ' active'" href="/teacher/today-english/words">단어조회</a>
                <a class="sidebar-subitem" th:classappend="${activeMenu == 'todayEnglishSentenceUpload'} ? ' active'" href="/teacher/today-english/sentences/upload">문장등록</a>
                <a class="sidebar-subitem" th:classappend="${activeMenu == 'todayEnglishSentences'} ? ' active'" href="/teacher/today-english/sentences">문장조회</a>
            </div>
        </div>
        <a class="nav-item" th:classappend="${activeMenu == 'notice'} ? ' active'" href="/teacher/notice">
            <span class="nav-icon">!</span> 알림장
        </a>
        <a class="nav-item" th:classappend="${activeMenu == 'board'} ? ' active'" href="/teacher/board">
            <span class="nav-icon">#</span> 게시판
        </a>
    </nav>
</aside>
</body>
</html>
