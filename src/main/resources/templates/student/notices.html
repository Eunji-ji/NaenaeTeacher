<!DOCTYPE html><html lang="ko" xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>알림장 | NaenaeTeacher</title><link rel="stylesheet" href="/assets/css/naenae-dashboard.css"></head><body class="naenae-dashboard-body"><div class="dashboard-shell"><aside th:replace="~{fragments/student-sidebar :: sidebar('notices')}"></aside><div class="dashboard-main"><header class="dashboard-header"><div><p class="header-kicker">Notice</p><h1 class="header-title">알림장</h1></div></header><main class="dashboard-content"><section class="dashboard-card word-test-card"><div class="page-toolbar"><div><h2>받은 알림</h2><p>내 반과 전체 학생에게 전달된 알림이에요.</p></div></div><div class="word-test-list" th:if="${noticePage.hasContent()}"><article class="word-test-list-item" th:each="item:${noticePage.content()}"><a class="word-test-list-content word-test-list-link" th:href="@{/student/notices/{id}(id=${item.id()})}"><p class="word-test-list-title" th:text="${item.title()}">제목</p><p class="word-test-list-meta"><span th:text="|대상 ${item.targetLabel()}|">대상</span><span th:text="${#temporals.format(item.createdAt(),'yyyy.MM.dd HH:mm')}">등록일</span><span th:text="|📎 ${item.attachmentCount()}개|">첨부</span></p></a></article></div><div class="empty-state" th:if="${!noticePage.hasContent()}">받은 알림이 없습니다.</div><div th:replace="~{fragments/pagination :: pagination(${noticePage}, '/student/notices')}"></div></section></main></div></div><script src="/assets/js/mobile-navigation.js" defer></script></body></html>
