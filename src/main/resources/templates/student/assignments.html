<!DOCTYPE html><html lang="ko" xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>진행중인 과제 | NaenaeTeacher</title><link rel="stylesheet" href="/assets/css/naenae-dashboard.css"></head><body class="naenae-dashboard-body"><div class="dashboard-shell"><aside th:replace="~{fragments/student-sidebar :: sidebar('assignments')}"></aside><div class="dashboard-main"><header class="dashboard-header"><div><p class="header-kicker">Assignments</p><h1 class="header-title">진행중인 과제</h1></div></header><main class="dashboard-content"><section class="dashboard-card word-test-card"><div class="page-toolbar"><div><h2>내 과제</h2><p>내 반에 등록된 진행중 과제만 보여요.</p></div></div><div class="word-test-list" th:if="${assignmentPage.hasContent()}"><article class="word-test-list-item" th:each="item:${assignmentPage.content()}"><a class="word-test-list-content word-test-list-link" th:href="@{/student/assignments/{id}(id=${item.id()})}"><p class="word-test-list-title"><span class="word-test-period" th:text="|[${#temporals.format(item.startDate(),'yyyy.MM.dd')} ~ ${#temporals.format(item.endDate(),'yyyy.MM.dd')}]|">기간</span><span th:text="|${item.courseNames()} ${item.title()}|">과제</span></p><p class="word-test-list-meta"><span th:text="|📎 첨부파일 ${item.attachmentCount()}개|">첨부</span></p></a></article></div><div class="empty-state" th:if="${!assignmentPage.hasContent()}">현재 진행중인 과제가 없습니다.</div><div th:replace="~{fragments/pagination :: pagination(${assignmentPage}, '/student/assignments')}"></div></section></main></div></div><script src="/assets/js/mobile-navigation.js" defer></script></body></html>
