<!DOCTYPE html><html lang="ko" xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>과제 상세 | NaenaeTeacher</title><link rel="stylesheet" href="/assets/css/naenae-dashboard.css"></head><body class="naenae-dashboard-body"><div class="dashboard-shell"><aside th:replace="~{fragments/student-sidebar :: sidebar('assignments')}"></aside><div class="dashboard-main"><header class="dashboard-header"><div><p class="header-kicker">Assignment Detail</p><h1 class="header-title">과제 상세</h1></div><a class="header-nav-action header-nav-action-secondary" href="/student/assignments">목록</a></header><main class="dashboard-content"><section class="dashboard-card assignment-detail-card"><div class="assignment-detail-header"><div><span class="summary-caption">과제 제목</span><h2 th:text="${assignment.title()}">제목</h2></div></div><dl class="assignment-detail-meta"><div><dt>대상 반</dt><dd th:text="${assignment.courseNames()}">반</dd></div><div><dt>기간</dt><dd th:text="|${#temporals.format(assignment.startDate(),'yyyy.MM.dd')} ~ ${#temporals.format(assignment.endDate(),'yyyy.MM.dd')}|">기간</dd></div></dl><div class="assignment-detail-section"><h3>과제 내용</h3><div class="assignment-detail-content" th:utext="${assignment.contentHtml()}">내용</div></div><div class="assignment-detail-section"><h3>첨부파일</h3><div class="assignment-download-list" th:if="${!#lists.isEmpty(assignment.attachments())}"><a class="assignment-download-item" th:each="file:${assignment.attachments()}" th:href="@{/student/assignments/{id}/attachments/{fileId}/download(id=${assignment.id()},fileId=${file.id()})}"><span>↓</span><strong th:text="${file.originalName()}">파일</strong><small th:text="${file.fileSizeLabel()}">크기</small></a></div><div class="empty-state" th:if="${#lists.isEmpty(assignment.attachments())}">첨부파일이 없습니다.</div></div></section></main></div></div><script src="/assets/js/mobile-navigation.js" defer></script></body></html>
