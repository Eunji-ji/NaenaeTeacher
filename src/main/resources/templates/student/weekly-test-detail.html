<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>주간테스트 상세 | NaenaeTeacher</title><link rel="stylesheet" href="/assets/css/naenae-dashboard.css"></head>
<body class="naenae-dashboard-body student-dashboard-body"><div class="dashboard-shell">
<aside th:replace="~{fragments/student-sidebar :: sidebar('learningWeeklyTests')}"></aside>
<div class="dashboard-main"><header class="dashboard-header"><div><p class="header-kicker">Weekly Test Detail</p><h1 class="header-title">주간테스트 상세</h1></div><a class="header-nav-action header-nav-action-secondary" href="/student/weekly-tests">목록</a></header>
<main class="dashboard-content"><section class="dashboard-card student-weekly-detail-card">
    <div class="student-weekly-detail-head"><div><span class="weekly-test-course-chip" th:text="${weeklyTest.courseName()}">중등1반</span><h2 th:text="${weeklyTest.name()}">테스트명</h2><p th:text="|등록 ${#temporals.format(weeklyTest.createdAt(),'yyyy.MM.dd HH:mm')}|">등록일</p></div><div class="student-weekly-detail-score"><span>내 점수</span><strong th:text="${weeklyTest.score()!=null ? weeklyTest.score()+'점' : '미입력'}">미입력</strong></div></div>
    <div class="weekly-test-remarks"><h3>테스트 내용</h3><p th:text="${weeklyTest.remarks()!=null ? weeklyTest.remarks() : '등록된 비고가 없습니다.'}">비고</p></div>
    <div class="weekly-test-files" th:if="${!#lists.isEmpty(weeklyTest.attachments())}"><h3>첨부파일</h3><a th:each="file:${weeklyTest.attachments()}" th:href="@{/student/weekly-tests/{testId}/attachments/{fileId}/download(testId=${weeklyTest.id()},fileId=${file.id()})}"><span th:text="${file.originalName()}">file</span><small th:text="${file.fileSize()}">1KB</small></a></div>
</section></main></div></div><script src="/assets/js/mobile-navigation.js" defer></script></body></html>
