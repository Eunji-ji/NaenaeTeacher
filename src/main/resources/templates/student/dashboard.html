<!DOCTYPE html><html lang="ko" xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>학생 대시보드 | NaenaeTeacher</title><link rel="stylesheet" href="/assets/css/naenae-dashboard.css"></head><body class="naenae-dashboard-body"><div class="dashboard-shell"><aside th:replace="~{fragments/student-sidebar :: sidebar('dashboard')}"></aside><div class="dashboard-main"><header class="dashboard-header"><div><p class="header-kicker">Student Dashboard</p><h1 class="header-title" th:text="|${studentDashboard.studentName()} 학생 대시보드|">학생 대시보드</h1></div><div class="header-actions"><form class="logout-form" action="/logout" method="post"><input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"><button class="logout-button" type="submit">나가기</button></form></div></header><main class="dashboard-content"><section class="dashboard-card"><div class="card-header"><h2 class="card-title"><span class="card-icon tone-info">Aa</span> 오늘의 단어</h2><span class="pill" th:text="${studentDashboard.levelLabel()}">레벨</span></div><p class="word" th:text="${studentDashboard.word()}">apple</p><p class="description" th:text="${studentDashboard.sentence()}">문장</p></section><section class="dashboard-card word-test-card"><div class="page-toolbar"><div><h2>최근 알림장</h2><p>전체 또는 내 반에 전달된 최신 알림이에요.</p></div><a class="header-nav-action header-nav-action-secondary" href="/student/notices">전체 보기</a></div><div class="word-test-list" th:if="${!#lists.isEmpty(studentDashboard.notices())}"><article class="word-test-list-item" th:each="item:${studentDashboard.notices()}"><a class="word-test-list-content word-test-list-link" th:href="@{/student/notices/{id}(id=${item.id()})}"><p class="word-test-list-title" th:text="${item.title()}">알림 제목</p><p class="word-test-list-meta"><span th:text="|대상 ${item.targetLabel()}|">대상</span><span th:text="${#temporals.format(item.createdAt(),'MM.dd HH:mm')}">등록일</span></p></a></article></div><div class="empty-state" th:if="${#lists.isEmpty(studentDashboard.notices())}">새 알림이 없습니다.</div></section></main></div></div></body></html>
