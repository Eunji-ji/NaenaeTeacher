<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>학생 대시보드 | NaenaeTeacher</title>
    <link rel="stylesheet" href="/assets/css/naenae-dashboard.css">
</head>
<body class="naenae-dashboard-body">
<div class="dashboard-shell">
    <aside th:replace="~{fragments/student-sidebar :: sidebar('dashboard')}"></aside>
    <div class="dashboard-main">
        <header class="dashboard-header">
            <div><p class="header-kicker">Student Dashboard</p><h1 class="header-title" th:text="|${studentDashboard.studentName()} 학생 대시보드|">학생 대시보드</h1></div>
            <div class="header-actions"><form class="logout-form" action="/logout" method="post"><input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"><button class="logout-button" type="submit" aria-label="로그아웃" title="로그아웃"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 3h10v18H5zM15 6h4v15h-4M11.5 12h.01"/></svg></button></form></div>
        </header>
        <main class="dashboard-content">
            <section class="dashboard-card">
                <div class="card-header"><h2 class="card-title"><span class="card-icon tone-info">Aa</span> 오늘의 단어</h2><span class="pill" th:text="${studentDashboard.levelLabel()}">레벨</span></div>
                <p class="word" th:text="${studentDashboard.word()}">apple</p><p class="description" th:text="${studentDashboard.wordMeaning()}">사과</p><p class="description" th:text="${studentDashboard.sentence()}">문장</p><p class="description today-sentence-meaning" th:text="${studentDashboard.sentenceMeaning()}">문장 뜻</p>
            </section>
            <section class="dashboard-card word-test-card">
                <div class="page-toolbar"><div><h2>진행중인 과제</h2><p>내 반에 등록된 현재 과제예요.</p></div><a class="header-nav-action header-nav-action-secondary" href="/student/assignments">전체 보기</a></div>
                <div class="word-test-list" th:if="${!#lists.isEmpty(studentDashboard.assignments())}"><article class="word-test-list-item" th:each="item:${studentDashboard.assignments()}"><a class="word-test-list-content word-test-list-link" th:href="@{/student/assignments/{id}(id=${item.id()})}"><p class="word-test-list-title" th:text="${item.title()}">과제 제목</p><p class="word-test-list-meta"><span th:text="${item.courseNames()}">반</span><span th:text="|~ ${#temporals.format(item.endDate(),'MM.dd')}|">마감</span></p></a></article></div>
                <div class="empty-state" th:if="${#lists.isEmpty(studentDashboard.assignments())}">진행중인 과제가 없습니다.</div>
            </section>
            <section class="dashboard-card word-test-card">
                <div class="page-toolbar"><div><h2>오늘의 알림장</h2><p>전체 또는 내 반에 전달된 최신 알림이에요.</p></div><a class="header-nav-action header-nav-action-secondary" href="/student/notices">전체 보기</a></div>
                <div class="word-test-list" th:if="${!#lists.isEmpty(studentDashboard.notices())}"><article class="word-test-list-item" th:each="item:${studentDashboard.notices()}"><a class="word-test-list-content word-test-list-link" th:href="@{/student/notices/{id}(id=${item.id()})}"><p class="word-test-list-title" th:text="${item.title()}">알림 제목</p><p class="description" th:text="${item.summary()}">알림 내용</p><p class="word-test-list-meta"><span th:text="|대상 ${item.targetLabel()}|">대상</span><span th:text="${#temporals.format(item.createdAt(),'MM.dd HH:mm')}">등록일</span></p></a></article></div>
                <div class="empty-state" th:if="${#lists.isEmpty(studentDashboard.notices())}">전달된 알림이 없습니다.</div>
            </section>
            <section class="dashboard-card word-test-card">
                <div class="page-toolbar"><div><h2>게시판</h2><p>학원에 올라온 최신 게시글이에요.</p></div><a class="header-nav-action header-nav-action-secondary" href="/student/board">전체 보기</a></div>
                <div class="word-test-list" th:if="${!#lists.isEmpty(studentDashboard.boardPosts())}"><article class="word-test-list-item" th:each="post:${studentDashboard.boardPosts()}"><a class="word-test-list-content word-test-list-link" th:href="@{/student/board/{id}(id=${post.id()})}"><p class="word-test-list-title" th:text="${post.title()}">게시글 제목</p><p class="word-test-list-meta"><span th:text="${post.authorLabel()}">작성자</span><span th:text="|댓글 ${post.commentCount()} · 조회 ${post.viewCount()}|">댓글 · 조회</span><span th:text="${#temporals.format(post.createdAt(),'MM.dd HH:mm')}">등록일</span></p></a></article></div>
                <div class="empty-state" th:if="${#lists.isEmpty(studentDashboard.boardPosts())}">등록된 게시글이 없습니다.</div>
            </section>
        </main>
    </div>
</div>
<script src="/assets/js/mobile-navigation.js" defer></script>
</body>
</html>
