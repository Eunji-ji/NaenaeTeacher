<!DOCTYPE html><html lang="ko" xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title th:text="${editMode}?'알림장 수정 | NaenaeTeacher':'알림장 등록 | NaenaeTeacher'">알림장 등록</title><link rel="stylesheet" href="/assets/css/naenae-dashboard.css"></head><body class="naenae-dashboard-body"><div class="dashboard-shell"><aside th:replace="~{fragments/teacher-sidebar :: sidebar('notice')}"></aside><div class="dashboard-main"><header class="dashboard-header"><div><p class="header-kicker">Notice Editor</p><h1 class="header-title" th:text="${editMode}?'알림장 수정':'알림장 등록'">알림장 등록</h1></div></header><main class="dashboard-content"><section class="dashboard-card assignment-editor-card"><div class="auth-alert error" th:if="${errorMessage}" th:text="${errorMessage}"></div><form id="noticeForm" th:action="${editMode}?@{/teacher/notice/{id}(id=${noticeId})}:@{/teacher/notice}" method="post" enctype="multipart/form-data"><input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"><div class="field-group"><label>알림 대상</label><div class="course-selection-grid"><label class="course-selection-card"><input id="targetAll" type="checkbox" name="targetAll" value="true" th:checked="${targetAll}"><span class="course-selection-check">✓</span><span class="course-selection-name">전체</span><span class="course-selection-help">모든 학생</span></label><label class="course-selection-card" th:each="course:${courses}"><input class="courseCheck" type="checkbox" name="courseIds" th:value="${course.id()}" th:checked="${#lists.contains(selectedCourseIds,course.id())}"><span class="course-selection-check">✓</span><span class="course-selection-name" th:text="${course.title()}">반</span><span class="course-selection-help">선택하기</span></label></div><p class="field-note">전체 또는 한 개 이상의 반을 선택하세요. 반은 여러 개 선택할 수 있습니다.</p></div><div class="field-group"><label for="title">제목</label><input id="title" name="title" type="text" maxlength="200" th:value="${title}" required></div><div class="field-group"><label>내용</label><div class="editor-shell"><div class="editor-toolbar"><button type="button" data-command="bold"><b>B</b></button><button type="button" data-command="italic"><i>I</i></button><button type="button" data-command="underline"><u>U</u></button><button type="button" data-command="insertUnorderedList">• 목록</button></div><div id="noticeEditor" class="assignment-editor" contenteditable="true" data-placeholder="학생에게 전달할 내용을 작성하세요."></div><input id="contentHtml" name="contentHtml" type="hidden"></div></div><div class="field-group" th:if="${!#lists.isEmpty(existingAttachments)}"><label>기존 첨부파일</label><div class="assignment-download-list"><a class="assignment-download-item" th:each="file:${existingAttachments}" th:href="@{/teacher/notice/{noticeId}/attachments/{fileId}/download(noticeId=${noticeId},fileId=${file.id()})}"><span>↓</span><strong th:text="${file.originalName()}">파일</strong><small th:text="${file.fileSizeLabel()}">크기</small></a></div></div><div class="field-group"><label for="attachments">첨부파일 <span class="field-note">기존 파일 포함 최대 5개 · 파일당 10MB</span></label><label class="attachment-dropzone" for="attachments"><span class="attachment-icon">＋</span><strong>클릭해서 파일을 선택하세요.</strong></label><input id="attachments" name="attachments" type="file" multiple hidden><div id="attachmentList" class="attachment-list"></div></div><div class="word-test-form-actions"><a class="bulk-action bulk-download" th:href="${editMode}?@{/teacher/notice/{id}(id=${noticeId})}:@{/teacher/notice}">취소</a><button class="bulk-action bulk-upload" type="submit" th:text="${editMode}?'알림 수정':'알림 등록'">등록</button></div></form></section></main></div></div><script th:inline="javascript">const editor=document.getElementById('noticeEditor');editor.innerHTML=/*[[${contentHtml}]]*/'';document.querySelectorAll('[data-command]').forEach(b=>b.onclick=()=>{document.execCommand(b.dataset.command,false,null);editor.focus();});const all=document.getElementById('targetAll'),courses=[...document.querySelectorAll('.courseCheck')];function syncTarget(){courses.forEach(c=>{c.disabled=all.checked;if(all.checked)c.checked=false;});}all.addEventListener('change',syncTarget);courses.forEach(c=>c.addEventListener('change',()=>{if(c.checked)all.checked=false;syncTarget();}));syncTarget();const input=document.getElementById('attachments'),list=document.getElementById('attachmentList'),existing=/*[[${#lists.size(existingAttachments)}]]*/0;input.addEventListener('change',()=>{if(existing+input.files.length>5){alert('첨부파일은 기존 파일을 포함해 최대 5개입니다.');input.value='';}list.textContent=[...input.files].map(f=>f.name).join(', ');});document.getElementById('noticeForm').addEventListener('submit',e=>{document.getElementById('contentHtml').value=editor.innerHTML;if(!all.checked&&!courses.some(c=>c.checked)){e.preventDefault();alert('전체 또는 알림을 보낼 반을 선택해 주세요.');}});</script></body></html>
