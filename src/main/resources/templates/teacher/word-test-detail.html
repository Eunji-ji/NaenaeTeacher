<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>단어시험 조회 | NaenaeTeacher</title>
    <link rel="stylesheet" href="/assets/css/naenae-dashboard.css">
</head>
<body class="naenae-dashboard-body">
<div class="dashboard-shell">
    <aside th:replace="~{fragments/teacher-sidebar :: sidebar('wordTests')}"></aside>
    <div class="dashboard-main">
        <header class="dashboard-header">
            <div><p class="header-kicker">Word Test Detail</p><h1 class="header-title">단어시험 조회</h1></div>
            <div class="header-actions">
                <a class="header-nav-action header-nav-action-secondary" href="/teacher/word-tests">목록</a>
                <a class="header-nav-action" th:href="@{/teacher/word-tests/{id}/edit(id=${wordTest.id()})}">수정</a>
            </div>
        </header>
        <main class="dashboard-content">
            <section class="dashboard-card word-test-card">
                <div class="word-test-detail-head">
                    <div>
                        <span class="summary-caption">게시 기간</span>
                        <strong th:text="|${#temporals.format(wordTest.startDate(), 'yyyy.MM.dd')} ~ ${#temporals.format(wordTest.endDate(), 'yyyy.MM.dd')}|">2026.07.15 ~ 2026.07.16</strong>
                    </div>
                    <div class="selected-course-summary">
                        <span class="summary-caption">대상 반</span>
                        <span class="selected-course-chip" th:each="course : ${wordTest.courses()}" th:text="${course.title()}">중등반1</span>
                    </div>
                </div>
                <div class="word-test-detail-list">
                    <div class="word-test-detail-row" th:each="item, stat : ${wordTest.words()}">
                        <span class="word-number" th:text="${stat.count}">1</span>
                        <strong th:text="${item.word()}">apple</strong>
                        <span th:text="${item.meaning() != null ? item.meaning() : '-'}">사과</span>
                    </div>
                </div>
            </section>
        </main>
    </div>
</div>
<script src="/assets/js/mobile-navigation.js" defer></script></body>
</html>
