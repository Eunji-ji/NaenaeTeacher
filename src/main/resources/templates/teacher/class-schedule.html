<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>시간표 | NaenaeTeacher</title>
    <link rel="stylesheet" href="/assets/css/naenae-dashboard.css">
</head>
<body class="naenae-dashboard-body">
<div class="dashboard-shell">
    <aside th:replace="~{fragments/teacher-sidebar :: sidebar('classSchedule')}"></aside>
    <div class="dashboard-main">
        <header class="dashboard-header"><div><p class="header-kicker">Weekly Timetable</p><h1 class="header-title">시간표</h1></div></header>
        <main class="dashboard-content">
            <div class="stack">
                <section class="welcome-card schedule-hero"><div class="mascot">🗓</div><div><h2>한 주 수업 흐름을 한눈에 확인해요.</h2><p>반과 수업 시간을 등록하면 월요일부터 금요일까지 시간순으로 정리됩니다.</p></div></section>
                <div class="auth-alert success" th:if="${successMessage}" th:text="${successMessage}"></div>
                <div class="auth-alert error" th:if="${errorMessage}" th:text="${errorMessage}"></div>

                <section class="dashboard-card schedule-register-card">
                    <div class="page-toolbar"><div><h2>수업 등록</h2><p>같은 요일의 겹치는 시간에는 수업을 중복 등록할 수 없습니다.</p></div></div>
                    <form class="schedule-register-form" action="/teacher/classes/schedule" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <div class="field-group"><label for="courseId">반</label><select id="courseId" name="courseId" required><option value="">반 선택</option><option th:each="course:${courses}" th:value="${course.id()}" th:text="${course.title()}" th:selected="${selectedCourseId == course.id()}">중등반</option></select></div>
                        <div class="field-group"><label for="weekday">요일</label><select id="weekday" name="weekday" required><option th:each="day:${weekdays}" th:value="${day.name()}" th:text="${day.label}" th:selected="${selectedWeekday == day}">월요일</option></select></div>
                        <div class="field-group"><label for="startTime">시작 시간</label><input id="startTime" name="startTime" type="time" th:value="${startTime}" required></div>
                        <div class="field-group"><label for="endTime">종료 시간</label><input id="endTime" name="endTime" type="time" th:value="${endTime}" required></div>
                        <div class="field-group schedule-title-field"><label for="lessonTitle">수업명</label><input id="lessonTitle" name="lessonTitle" type="text" maxlength="150" placeholder="예: 중등 문법 집중 수업" th:value="${lessonTitle}" required></div>
                        <button class="bulk-action bulk-upload schedule-submit" type="submit">시간표 등록</button>
                    </form>
                </section>

                <section class="dashboard-card weekly-schedule-card">
                    <div class="page-toolbar"><div><h2>주간 시간표</h2><p>월요일부터 금요일까지 등록한 수업을 시간순으로 확인하세요.</p></div><form action="/teacher/classes/schedule/all/delete" method="post" onsubmit="return confirm('등록된 시간표를 모두 삭제할까요? 이 작업은 되돌릴 수 없습니다.');"><input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"><button class="bulk-action schedule-delete-all" type="submit">시간표 전체삭제</button></form></div>
                    <div class="weekly-timetable">
                        <section class="timetable-day" th:each="day:${scheduleDays}">
                            <header class="timetable-day-header"><span class="timetable-day-badge" th:text="${day.shortLabel()}">월</span><div><strong th:text="${day.label()}">월요일</strong><small th:text="|${#lists.size(day.schedules())}개 수업|">0개 수업</small></div></header>
                            <div class="timetable-day-body">
                                <article class="timetable-class" th:each="item:${day.schedules()}">
                                    <div class="timetable-time"><strong th:text="${#temporals.format(item.startTime(),'HH:mm')}">16:00</strong><span>—</span><small th:text="${#temporals.format(item.endTime(),'HH:mm')}">17:00</small></div>
                                    <span class="timetable-course" th:text="${item.courseTitle()}">중등반</span>
                                    <h3 th:text="${item.lessonTitle()}">중등 문법 집중 수업</h3>
                                    <form th:action="@{/teacher/classes/schedule/{id}/delete(id=${item.id()})}" method="post" onsubmit="return confirm('이 수업을 시간표에서 삭제할까요?');">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                        <button class="timetable-delete" type="submit" aria-label="시간표 삭제">삭제</button>
                                    </form>
                                </article>
                                <div class="timetable-empty" th:if="${#lists.isEmpty(day.schedules())}"><span>☁</span><p>등록된 수업이 없어요.</p></div>
                            </div>
                        </section>
                    </div>
                </section>
            </div>
        </main>
    </div>
</div>
<script src="/assets/js/mobile-navigation.js" defer></script>
</body>
</html>
