<!DOCTYPE html><html lang="ko" xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>알림장 상세 | NaenaeTeacher</title><link rel="stylesheet" href="/assets/css/naenae-dashboard.css"></head><body class="naenae-dashboard-body"><div class="dashboard-shell"><aside th:replace="~{fragments/teacher-sidebar :: sidebar('notice')}"></aside><div class="dashboard-main"><header class="dashboard-header"><div><p class="header-kicker">Notice Detail</p><h1 class="header-title">알림장 상세</h1></div><div class="header-actions"><a class="header-nav-action header-nav-action-secondary" href="/teacher/notice">목록</a><a class="header-nav-action" th:href="@{/teacher/notice/{id}/edit(id=${notice.id()})}">수정</a></div></header><main class="dashboard-content"><section class="dashboard-card assignment-detail-card"><div class="assignment-detail-header"><div><span class="summary-caption">알림 제목</span><h2 th:text="${notice.title()}">제목</h2></div><span th:text="|등록 ${#temporals.format(notice.createdAt(),'yyyy.MM.dd HH:mm')}|">등록일</span></div><dl class="assignment-detail-meta"><div><dt>알림 대상</dt><dd th:text="${notice.targetLabel()}">전체</dd></div></dl><div class="assignment-detail-section"><h3>알림 내용</h3><div class="assignment-detail-content" th:utext="${notice.contentHtml()}">내용</div></div><div class="assignment-detail-section"><h3>첨부파일</h3><div class="assignment-download-list" th:if="${!#lists.isEmpty(notice.attachments())}"><a class="assignment-download-item" th:each="file:${notice.attachments()}" th:href="@{/teacher/notice/{noticeId}/attachments/{fileId}/download(noticeId=${notice.id()},fileId=${file.id()})}"><span>↓</span><strong th:text="${file.originalName()}">파일</strong><small th:text="${file.fileSizeLabel()}">크기</small></a></div><div class="empty-state" th:if="${#lists.isEmpty(notice.attachments())}">첨부파일이 없습니다.</div></div></section></main></div></div></body></html>
