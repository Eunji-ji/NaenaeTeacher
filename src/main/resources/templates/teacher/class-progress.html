<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>진도관리 | NaenaeTeacher</title>
    <link rel="stylesheet" href="/assets/css/naenae-dashboard.css">
</head>
<body class="naenae-dashboard-body">
<div class="dashboard-shell">
    <aside th:replace="~{fragments/teacher-sidebar :: sidebar('classProgress')}"></aside>
    <div class="dashboard-main">
        <header class="dashboard-header">
            <div><p class="header-kicker">Progress Notes</p><h1 class="header-title">진도관리</h1></div>
        </header>
        <main class="dashboard-content">
            <div class="stack">
                <section class="welcome-card progress-hero">
                    <div class="progress-hero-icon" aria-hidden="true">✎</div>
                    <div class="progress-hero-copy"><span>LESSON LOG</span><h2>오늘 수업, 어디까지 했나요?</h2><p>수업 진도와 다음 시간에 이어갈 내용을 간편하게 기록해 보세요.</p></div>
                    <div class="progress-hero-note" aria-hidden="true"><i></i><i></i><i></i></div>
                </section>

                <div class="auth-alert success" th:if="${successMessage}" th:text="${successMessage}"></div>
                <div class="auth-alert error" th:if="${errorMessage}" th:text="${errorMessage}"></div>

                <section class="dashboard-card progress-compose-card">
                    <div class="page-toolbar"><div><h2>새 진도 메모</h2><p>반과 시간표는 선택사항이며, 메모는 최대 1,000자까지 입력할 수 있어요.</p></div></div>
                    <form class="progress-compose-form" action="/teacher/classes/progress" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <div class="progress-select-row">
                            <div class="field-group">
                                <label for="progressCourse">반 <span class="optional-label">선택</span></label>
                                <select id="progressCourse" name="courseId">
                                    <option value="">선택 안 함</option>
                                    <option th:each="course:${courses}" th:value="${course.id()}" th:text="${course.title()}" th:selected="${selectedCourseId == course.id()}">중등1반</option>
                                </select>
                            </div>
                            <div class="field-group">
                                <label for="progressSchedule">시간표 <span class="optional-label">선택</span></label>
                                <select id="progressSchedule" name="scheduleId">
                                    <option value="">선택 안 함</option>
                                    <option th:each="schedule:${schedules}"
                                            th:value="${schedule.id()}"
                                            th:attr="data-course-id=${schedule.courseId()}"
                                            th:selected="${selectedScheduleId == schedule.id()}"
                                            th:text="|${schedule.weekdayLabel()} ${#temporals.format(schedule.startTime(),'HH:mm')}~${#temporals.format(schedule.endTime(),'HH:mm')} · ${schedule.lessonTitle()}|">월요일 16:00~17:00 · 영어문법</option>
                                </select>
                            </div>
                        </div>
                        <div class="field-group progress-memo-field">
                            <label for="progressMemo">진도 메모</label>
                            <textarea id="progressMemo" name="memo" maxlength="1000" rows="6" required
                                      placeholder="예: Unit 3 현재완료까지 진행. 다음 시간에는 워크북 24쪽부터 시작하기."
                                      th:text="${memo}"></textarea>
                            <div class="memo-counter"><span id="memoLength">0</span> / 1,000자</div>
                        </div>
                        <button class="bulk-action bulk-upload progress-submit" type="submit">포스트잇 붙이기</button>
                    </form>
                </section>

                <section class="progress-board-section">
                    <div class="page-toolbar progress-board-heading"><div><h2>진도 관리 목록</h2><p th:text="|총 ${progressPage.totalElements()}개의 메모가 있어요.|">총 0개의 메모가 있어요.</p></div></div>
                    <div class="progress-note-grid" th:if="${progressPage.hasContent()}">
                        <article class="progress-sticky-note" th:each="note:${progressPage.content()}" th:classappend="${note.colorClass()}">
                            <span class="sticky-tape" aria-hidden="true"></span>
                            <header class="sticky-note-header">
                                <div class="sticky-tags" th:if="${note.hasCourse() || note.hasLesson()}">
                                    <span class="sticky-tag" th:if="${note.hasCourse()}" th:text="|[${note.courseTitle()}]|">[중등1반]</span>
                                    <span class="sticky-tag" th:if="${note.hasLesson()}" th:text="|[${note.lessonTitle()}]|">[영어문법]</span>
                                </div>
                                <span class="sticky-free-label" th:unless="${note.hasCourse() || note.hasLesson()}">자유 메모</span>
                                <form th:action="@{/teacher/classes/progress/{id}/delete(id=${note.id()})}" method="post" onsubmit="return confirm('이 진도 메모를 삭제할까요?');">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                    <button class="sticky-delete" type="submit" aria-label="진도 메모 삭제">×</button>
                                </form>
                            </header>
                            <p class="sticky-note-content" th:text="${note.memo()}">진도 메모 내용</p>
                            <time class="sticky-note-date" th:text="${#temporals.format(note.createdAt(),'yyyy.MM.dd HH:mm')}">2026.07.16 10:00</time>
                        </article>
                    </div>
                    <div class="progress-empty-board" th:unless="${progressPage.hasContent()}">
                        <span>✦</span><h3>아직 붙여둔 메모가 없어요.</h3><p>첫 진도 메모를 남겨 수업의 흐름을 기록해 보세요.</p>
                    </div>
                    <div th:replace="~{fragments/pagination :: pagination(${progressPage}, ${progressPaginationUrl})}"></div>
                </section>
            </div>
        </main>
    </div>
</div>
<script src="/assets/js/mobile-navigation.js" defer></script>
<script src="/assets/js/class-progress.js" defer></script>
</body>
</html>
