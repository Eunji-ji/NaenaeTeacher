<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>단어시험 | NaenaeTeacher</title>
    <link rel="stylesheet" href="/assets/css/naenae-dashboard.css">
</head>
<body class="naenae-dashboard-body">
<div class="dashboard-shell">
    <aside th:replace="~{fragments/teacher-sidebar :: sidebar('wordTests')}"></aside>

    <div class="dashboard-main">
        <header class="dashboard-header">
            <div><p class="header-kicker">Word Test</p><h1 class="header-title">단어시험</h1></div>
            <form class="logout-form" action="/logout" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button class="logout-button" type="submit">나가기</button>
            </form>
        </header>

        <main class="dashboard-content">
            <section class="dashboard-card word-test-card">
                <div class="page-toolbar">
                    <div><h2>시험을 등록할 반 선택</h2><p>같은 단어시험을 배정할 반을 여러 개 선택할 수 있어요.</p></div>
                </div>
                <div class="auth-alert success" th:if="${successMessage}" th:text="${successMessage}"></div>
                <div class="auth-alert error" th:if="${errorMessage}" th:text="${errorMessage}"></div>
                <form action="/teacher/word-tests/new" method="post" class="word-test-course-form">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <div class="course-selection-grid" th:if="${!#lists.isEmpty(courses)}">
                        <label class="course-selection-card" th:each="course : ${courses}">
                            <input type="checkbox" name="courseIds" th:value="${course.id()}">
                            <span class="course-selection-check">✓</span>
                            <span class="course-selection-name" th:text="${course.title()}">중등반</span>
                            <span class="course-selection-help">선택하기</span>
                        </label>
                    </div>
                    <div class="empty-state" th:if="${#lists.isEmpty(courses)}">등록된 반이 없습니다. 먼저 반을 등록해 주세요.</div>
                    <div class="word-test-form-actions" th:if="${!#lists.isEmpty(courses)}">
                        <span id="selectedCourseCount" class="selection-count">0개 반 선택</span>
                        <button class="bulk-action bulk-upload" type="submit">단어등록</button>
                    </div>
                </form>
            </section>

            <section class="dashboard-card word-test-card word-test-list-card">
                <div class="page-toolbar">
                    <div><h2>등록한 단어시험</h2><p>최근 등록한 시험부터 확인할 수 있어요.</p></div>
                </div>
                <div class="word-test-list" th:if="${wordTestPage.hasContent()}">
                    <article class="word-test-list-item" th:each="test : ${wordTestPage.content()}">
                        <a class="word-test-list-content word-test-list-link"
                           th:href="@{/teacher/word-tests/{id}(id=${test.id()})}"
                           aria-label="단어시험 상세 조회">
                            <p class="word-test-list-title">
                                <span class="word-test-period"
                                      th:text="|[${#temporals.format(test.startDate(), 'yyyy.MM.dd')} ~ ${#temporals.format(test.endDate(), 'yyyy.MM.dd')}]|">[기간]</span>
                                <span th:text="|${test.courseNames()} 단어시험|">반명 단어시험</span>
                            </p>
                            <p class="word-test-list-meta">
                                <span th:text="|등록 ${#temporals.format(test.createdAt(), 'yyyy.MM.dd HH:mm')}|">등록일</span>
                                <span th:text="| · 단어 ${test.wordCount()}개|">단어 10개</span>
                            </p>
                        </a>
                        <div class="word-test-list-actions">
                            <a class="word-test-action-button edit" th:href="@{/teacher/word-tests/{id}/edit(id=${test.id()})}">수정</a>
                            <form th:action="@{/teacher/word-tests/{id}/delete(id=${test.id()})}" method="post"
                                  onsubmit="return confirm('이 단어시험을 삭제할까요?');">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                <button class="word-test-action-button danger" type="submit">삭제</button>
                            </form>
                        </div>
                    </article>
                </div>
                <div class="empty-state" th:if="${!wordTestPage.hasContent()}">아직 등록한 단어시험이 없습니다.</div>
                <div th:replace="~{fragments/pagination :: pagination(${wordTestPage}, '/teacher/word-tests')}"></div>
            </section>
        </main>
    </div>
</div>
<script>
    const checks = document.querySelectorAll('input[name="courseIds"]');
    const label = document.getElementById('selectedCourseCount');
    const updateCount = () => {
        if (label) label.textContent = `${document.querySelectorAll('input[name="courseIds"]:checked').length}개 반 선택`;
    };
    checks.forEach(check => check.addEventListener('change', updateCount));
</script>
</body>
</html>
