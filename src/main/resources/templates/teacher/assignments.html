<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>과제등록 | NaenaeTeacher</title>
    <link rel="stylesheet" href="/assets/css/naenae-dashboard.css">
</head>
<body class="naenae-dashboard-body">
<div class="dashboard-shell">
    <aside th:replace="~{fragments/teacher-sidebar :: sidebar('assignments')}"></aside>

    <div class="dashboard-main">
        <header class="dashboard-header">
            <div><p class="header-kicker">Assignment</p><h1 class="header-title">과제등록</h1></div>
        </header>
        <main class="dashboard-content">
            <section class="dashboard-card word-test-card">
                <div class="page-toolbar">
                    <div><h2>과제를 등록할 반 선택</h2><p>같은 과제를 배정할 반을 여러 개 선택할 수 있어요.</p></div>
                </div>
                <div class="auth-alert success" th:if="${successMessage}" th:text="${successMessage}"></div>
                <div class="auth-alert error" th:if="${errorMessage}" th:text="${errorMessage}"></div>
                <form action="/teacher/assignments/new" method="post" class="word-test-course-form">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <div class="course-selection-grid" th:if="${!#lists.isEmpty(courses)}">
                        <label class="course-selection-card" th:each="course : ${courses}">
                            <input type="checkbox" name="courseIds" th:value="${course.id()}">
                            <span class="course-selection-check">✓</span>
                            <span class="course-selection-name" th:text="${course.title()}">중등반</span>
                            <span class="course-selection-help">선택하기</span>
                        </label>
                    </div>
                    <div class="empty-state" th:if="${#lists.isEmpty(courses)}">등록된 반이 없습니다. 먼저 반을 등록해 주세요.</div>
                    <div class="word-test-form-actions" th:if="${!#lists.isEmpty(courses)}">
                        <span id="selectedCourseCount" class="selection-count">0개 반 선택</span>
                        <button class="bulk-action bulk-upload" type="submit">과제등록</button>
                    </div>
                </form>
            </section>

            <section class="dashboard-card word-test-card word-test-list-card">
                <div class="page-toolbar">
                    <div><h2>등록한 과제</h2><p>최근 등록한 과제부터 확인할 수 있어요.</p></div>
                </div>
                <div class="word-test-list" th:if="${assignmentPage.hasContent()}">
                    <article class="word-test-list-item" th:each="item : ${assignmentPage.content()}">
                        <a class="word-test-list-content word-test-list-link"
                           th:href="@{/teacher/assignments/{id}(id=${item.id()})}"
                           aria-label="과제 상세 조회">
                            <p class="word-test-list-title">
                                <span class="word-test-period"
                                      th:text="|[${#temporals.format(item.startDate(), 'yyyy.MM.dd')} ~ ${#temporals.format(item.endDate(), 'yyyy.MM.dd')}]|">[기간]</span>
                                <span th:text="|${item.courseNames()} ${item.title()}|">반명 과제명</span>
                            </p>
                            <p class="word-test-list-meta">
                                <span th:text="|등록 ${#temporals.format(item.createdAt(), 'yyyy.MM.dd HH:mm')}|">등록일</span>
                                <span class="assignment-attachment-count"
                                      th:text="|📎 첨부파일 ${item.attachmentCount()}개|">📎 첨부파일 0개</span>
                            </p>
                        </a>
                        <div class="word-test-list-actions">
                            <a class="word-test-action-button edit"
                               th:href="@{/teacher/assignments/{id}/edit(id=${item.id()})}">수정</a>
                            <form th:action="@{/teacher/assignments/{id}/delete(id=${item.id()})}"
                                  method="post"
                                  onsubmit="return confirm('이 과제를 삭제할까요?');">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                <button class="word-test-action-button danger" type="submit">삭제</button>
                            </form>
                        </div>
                    </article>
                </div>
                <div class="empty-state" th:if="${!assignmentPage.hasContent()}">아직 등록한 과제가 없습니다.</div>
                <div th:replace="~{fragments/pagination :: pagination(${assignmentPage}, '/teacher/assignments')}"></div>
            </section>
        </main>
    </div>
</div>
<script>
    const checks = document.querySelectorAll('[name="courseIds"]');
    const label = document.getElementById('selectedCourseCount');
    const updateCount = () => {
        if (label) label.textContent = `${document.querySelectorAll('[name="courseIds"]:checked').length}개 반 선택`;
    };
    checks.forEach(check => check.addEventListener('change', updateCount));
</script>
</body>
</html>
