<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>과제등록 | NaenaeTeacher</title><link rel="stylesheet" href="/assets/css/naenae-dashboard.css"></head>
<body class="naenae-dashboard-body"><div class="dashboard-shell">
<aside class="dashboard-sidebar" aria-label="선생님 메뉴"><div class="brand"><span class="brand-mark">N</span><div><p class="brand-name" th:text="${teacherDisplayName}">선생님</p><p class="brand-role">Teacher Space</p></div></div>
<nav class="sidebar-nav"><a class="nav-item" href="/teacher/dashboard"><span class="nav-icon">⌂</span> 대시보드</a>
<div class="sidebar-section"><div class="sidebar-section-label"><span class="nav-icon">👥</span> 학생관리</div><div class="sidebar-subnav"><a class="sidebar-subitem" href="/teacher/courses"><span class="nav-icon">•</span> 반등록</a><a class="sidebar-subitem" href="/teacher/students"><span class="nav-icon">•</span> 학생등록</a><a class="sidebar-subitem" href="/teacher/students/bulk"><span class="nav-icon">•</span> 학생일괄등록</a><a class="sidebar-subitem" href="/teacher/attendance"><span class="nav-icon">•</span> 출석관리</a><a class="sidebar-subitem" href="/teacher/students/status"><span class="nav-icon">•</span> 학생 학습관리</a></div></div>
<div class="sidebar-section"><div class="sidebar-section-label"><span class="nav-icon">📝</span> 과제관리</div><div class="sidebar-subnav"><a class="sidebar-subitem" href="/teacher/word-tests"><span class="nav-icon">•</span> 단어시험</a><a class="sidebar-subitem active" href="/teacher/assignments"><span class="nav-icon">•</span> 과제등록</a></div></div>
</nav></aside>
<div class="dashboard-main"><header class="dashboard-header"><div><p class="header-kicker">Assignment</p><h1 class="header-title">과제등록</h1></div></header>
<main class="dashboard-content"><section class="dashboard-card word-test-card"><div class="page-toolbar"><div><h2>과제를 등록할 반 선택</h2><p>같은 과제를 배정할 반을 여러 개 선택할 수 있어요.</p></div></div><div class="auth-alert success" th:if="${successMessage}" th:text="${successMessage}"></div><div class="auth-alert error" th:if="${errorMessage}" th:text="${errorMessage}"></div>
<form action="/teacher/assignments/new" method="post" class="word-test-course-form"><input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"><div class="course-selection-grid"><label class="course-selection-card" th:each="course : ${courses}"><input type="checkbox" name="courseIds" th:value="${course.id()}"><span class="course-selection-check">✓</span><span class="course-selection-name" th:text="${course.title()}">중등반</span><span class="course-selection-help">선택하기</span></label></div><div class="word-test-form-actions"><span id="selectedCourseCount" class="selection-count">0개 반 선택</span><button class="bulk-action bulk-upload" type="submit">과제등록</button></div></form>
</section><section class="dashboard-card word-test-card word-test-list-card"><div class="page-toolbar"><div><h2>등록된 과제</h2><p>저장한 과제를 기간과 반별로 확인할 수 있어요.</p></div></div><div class="word-test-list" th:if="${!#lists.isEmpty(assignments)}"><article class="word-test-list-item" th:each="item:${assignments}"><div class="word-test-list-content"><p class="word-test-list-title"><span class="word-test-period" th:text="|[${#temporals.format(item.startDate(),'yyyy.MM.dd')} ~ ${#temporals.format(item.endDate(),'yyyy.MM.dd')}]|">[기간]</span> <span th:text="|${item.courseNames()} ${item.title()}|">반명 과제명</span></p><p class="word-test-list-meta" th:text="|첨부파일 ${item.attachmentCount()}개|">첨부파일 0개</p></div></article></div><div class="empty-state" th:if="${#lists.isEmpty(assignments)}">아직 등록된 과제가 없습니다.</div></section></main></div></div>
<script>const checks=document.querySelectorAll('[name="courseIds"]'),label=document.getElementById('selectedCourseCount');checks.forEach(c=>c.addEventListener('change',()=>label.textContent=`${document.querySelectorAll('[name="courseIds"]:checked').length}개 반 선택`));</script></body></html>
