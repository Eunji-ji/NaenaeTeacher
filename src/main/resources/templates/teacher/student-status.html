<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>학생 학습 관리 | NaenaeTeacher</title>
    <link rel="stylesheet" href="/assets/css/naenae-dashboard.css">
</head>
<body class="naenae-dashboard-body">
<div class="dashboard-shell">
    <aside th:replace="~{fragments/teacher-sidebar :: sidebar('studentStatus')}"></aside>

    <div class="dashboard-main">
        <header class="dashboard-header">
            <div>
                <p class="header-kicker">Student Learning</p>
                <h1 class="header-title">학생 학습 관리</h1>
            </div>
            <div class="header-actions">
                <form class="logout-form" action="/logout" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button class="logout-button" type="submit" aria-label="로그아웃" title="로그아웃"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 3h10v18H5zM15 6h4v15h-4M11.5 12h.01"/></svg></button>
                </form>
            </div>
        </header>

        <main class="dashboard-content">
            <div class="stack">
                <section class="dashboard-card">
                    <div class="page-toolbar">
                        <div>
                            <h2>학생 특징 관리</h2>
                            <p>반별로 학생을 조회하고, 학생 옆에 특징을 1000자까지 저장할 수 있습니다.</p>
                            <p th:if="${studentStatusPage.selectedCourseTitle() != null}">
                                현재 반: <strong th:text="${studentStatusPage.selectedCourseTitle()}">초등 A반</strong>
                            </p>
                        </div>
                        <form class="filter-form" action="/teacher/students/status" method="get">
                            <select name="courseId" aria-label="반 선택" onchange="this.form.submit()">
                                <option th:each="course : ${studentStatusPage.courses()}"
                                        th:value="${course.id()}"
                                        th:selected="${studentStatusPage.selectedCourseId() != null and studentStatusPage.selectedCourseId() == course.id()}"
                                        th:text="${course.title()}">초등 A반</option>
                            </select>
                        </form>
                    </div>

                    <div class="auth-alert success" th:if="${successMessage}" th:text="${successMessage}">
                        특징이 저장되었습니다.
                    </div>
                    <div class="auth-alert error" th:if="${errorMessage}" th:text="${errorMessage}">
                        입력값을 확인해 주세요.
                    </div>

                    <div class="empty-state" th:if="${#lists.isEmpty(studentStatusPage.courses())}">
                        먼저 반등록에서 반을 추가해 주세요.
                    </div>

                    <div class="table-scroll" th:if="${!#lists.isEmpty(studentStatusPage.courses())}">
                        <table class="student-table student-status-table">
                            <thead>
                            <tr>
                                <th>학생명</th>
                                <th>반</th>
                                <th>학교</th>
                                <th>전화번호</th>
                                <th>특징</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:if="${#lists.isEmpty(studentStatusPage.students())}">
                                <td class="empty-state" colspan="5">등록된 학생이 없습니다.</td>
                            </tr>
                            <tr th:each="student : ${studentStatusPage.students()}">
                                <td th:text="${student.studentName()}">김지우</td>
                                <td th:text="${student.courseTitle()}">초등 A반</td>
                                <td th:text="${student.schoolName() ?: '-'}">내곡초</td>
                                <td th:text="${student.phone() ?: '-'}">010-0000-0000</td>
                                <td>
                                    <form class="student-status-form" action="/teacher/students/status" method="post">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                        <input type="hidden" name="courseId" th:value="${studentStatusPage.selectedCourseId()}">
                                        <input type="hidden" name="studentId" th:value="${student.studentId()}">
                                        <textarea name="memoSummary"
                                                  maxlength="1000"
                                                  rows="4"
                                                  th:text="${student.memoSummary()}"></textarea>
                                        <button type="submit" class="table-action-button">저장</button>
                                    </form>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </section>
            </div>
        </main>
    </div>
</div>
<script src="/assets/js/mobile-navigation.js" defer></script></body>
</html>
