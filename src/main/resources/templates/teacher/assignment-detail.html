<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>과제 상세조회 | NaenaeTeacher</title>
    <link rel="stylesheet" href="/assets/css/naenae-dashboard.css">
</head>
<body class="naenae-dashboard-body">
<div class="dashboard-shell">
    <aside th:replace="~{fragments/teacher-sidebar :: sidebar('assignments')}"></aside>

    <div class="dashboard-main">
        <header class="dashboard-header">
            <div><p class="header-kicker">Assignment Detail</p><h1 class="header-title">과제 상세조회</h1></div>
            <div class="header-actions">
                <a class="header-nav-action header-nav-action-secondary" href="/teacher/assignments">목록</a>
                <a class="header-nav-action"
                   th:href="@{/teacher/assignments/{id}/edit(id=${assignment.id()})}">수정</a>
            </div>
        </header>
        <main class="dashboard-content">
            <section class="dashboard-card assignment-detail-card">
                <div class="assignment-detail-header">
                    <div>
                        <span class="summary-caption">과제 제목</span>
                        <h2 th:text="${assignment.title()}">과제 제목</h2>
                    </div>
                    <span class="assignment-created-at"
                          th:text="|등록 ${#temporals.format(assignment.createdAt(), 'yyyy.MM.dd HH:mm')}|">등록일</span>
                </div>
                <dl class="assignment-detail-meta">
                    <div><dt>대상 반</dt><dd th:text="${assignment.courseNames()}">중등반</dd></div>
                    <div><dt>게시 기간</dt><dd th:text="|${#temporals.format(assignment.startDate(), 'yyyy.MM.dd')} ~ ${#temporals.format(assignment.endDate(), 'yyyy.MM.dd')}|">기간</dd></div>
                </dl>
                <div class="assignment-detail-section">
                    <h3>과제 내용</h3>
                    <div class="assignment-detail-content" th:utext="${assignment.contentHtml()}">과제 내용</div>
                </div>
                <div class="assignment-detail-section">
                    <h3>첨부파일</h3>
                    <div class="assignment-download-list" th:if="${!#lists.isEmpty(assignment.attachments())}">
                        <a class="assignment-download-item"
                           th:each="attachment : ${assignment.attachments()}"
                           th:href="@{/teacher/assignments/{assignmentId}/attachments/{attachmentId}/download(assignmentId=${assignment.id()}, attachmentId=${attachment.id()})}">
                            <span aria-hidden="true">↓</span>
                            <strong th:text="${attachment.originalName()}">파일명</strong>
                            <small th:text="${attachment.fileSizeLabel()}">0 KB</small>
                        </a>
                    </div>
                    <div class="empty-state" th:if="${#lists.isEmpty(assignment.attachments())}">등록된 첨부파일이 없습니다.</div>
                </div>
            </section>
        </main>
    </div>
</div>
</body>
</html>
