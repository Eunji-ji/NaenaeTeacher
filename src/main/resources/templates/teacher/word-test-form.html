<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${editMode} ? '단어시험 수정 | NaenaeTeacher' : '단어등록 | NaenaeTeacher'">단어등록 | NaenaeTeacher</title>
    <link rel="stylesheet" href="/assets/css/naenae-dashboard.css">
</head>
<body class="naenae-dashboard-body">
<div class="dashboard-shell">
    <aside class="dashboard-sidebar" aria-label="선생님 메뉴">
        <div class="brand">
            <span class="brand-mark">N</span>
            <div><p class="brand-name" th:text="${teacherDisplayName}">김지우쌤</p><p class="brand-role">Teacher Space</p></div>
        </div>
        <nav class="sidebar-nav">
            <a class="nav-item" href="/teacher/dashboard"><span class="nav-icon">⌂</span> 대시보드</a>
            <div class="sidebar-section" aria-label="학생관리">
                <div class="sidebar-section-label"><span class="nav-icon" aria-hidden="true">👥</span> 학생관리</div>
                <div class="sidebar-subnav">
                    <a class="sidebar-subitem" href="/teacher/courses"><span class="nav-icon">•</span> 반등록</a>
                    <a class="sidebar-subitem" href="/teacher/students"><span class="nav-icon">•</span> 학생등록</a>
                    <a class="sidebar-subitem" href="/teacher/students/bulk"><span class="nav-icon">•</span> 학생일괄등록</a>
                    <a class="sidebar-subitem" href="/teacher/attendance"><span class="nav-icon">•</span> 출석관리</a>
                    <a class="sidebar-subitem" href="/teacher/students/status"><span class="nav-icon">•</span> 학생 학습관리</a>
                </div>
            </div>
            <div class="sidebar-section" aria-label="과제관리">
                <div class="sidebar-section-label"><span class="nav-icon" aria-hidden="true">📝</span> 과제관리</div>
                <div class="sidebar-subnav">
                    <a class="sidebar-subitem active" href="/teacher/word-tests"><span class="nav-icon">•</span> 단어시험</a>
                    <a class="sidebar-subitem" href="/teacher/assignments"><span class="nav-icon">•</span> 과제등록</a>
                </div>
            </div>
            <a class="nav-item" href="/teacher/today-english"><span class="nav-icon">Aa</span> 오늘의 영어</a>
            <a class="nav-item" href="/teacher/notice"><span class="nav-icon">!</span> 알림장</a>
            <a class="nav-item" href="/teacher/board"><span class="nav-icon">#</span> 게시판</a>
            <a class="nav-item" href="/teacher/settings"><span class="nav-icon">⚙</span> 설정</a>
        </nav>
    </aside>

    <div class="dashboard-main">
        <header class="dashboard-header">
            <div><p class="header-kicker">Word Registration</p><h1 class="header-title" th:text="${editMode} ? '단어시험 수정' : '단어등록'">단어등록</h1></div>
            <a class="header-nav-action header-nav-action-secondary" href="/teacher/word-tests">반 다시 선택</a>
        </header>

        <main class="dashboard-content">
            <section class="dashboard-card word-test-card">
                <div class="selected-course-summary">
                    <span class="summary-caption">선택한 반</span>
                    <span class="selected-course-chip" th:each="course : ${selectedCourses}" th:text="${course.title()}">중등 A반</span>
                </div>
                <div class="auth-alert error" th:if="${errorMessage}" th:text="${errorMessage}"></div>

                <div class="word-test-period-control">
                    <div class="field-group">
                        <label for="startDate">게시 시작일</label>
                        <input id="startDate" name="startDate" type="date" form="wordRegistrationForm"
                               th:value="${startDate}" required>
                    </div>
                    <span class="period-divider">~</span>
                    <div class="field-group">
                        <label for="endDate">게시 종료일</label>
                        <input id="endDate" name="endDate" type="date" form="wordRegistrationForm"
                               th:value="${endDate}" required>
                    </div>
                    <p>이 기간에만 학생의 단어테스트 메뉴에 표시됩니다.</p>
                </div>

                <div class="word-count-control">
                    <label for="wordCount">등록할 단어 개수</label>
                    <div class="word-count-input-wrap">
                        <input id="wordCount" type="number" min="1" max="100"
                               th:value="${submittedWords != null ? #lists.size(submittedWords) : 10}">
                        <span>개</span>
                    </div>
                    <p>1개부터 최대 100개까지 입력할 수 있어요.</p>
                </div>

                <form id="wordRegistrationForm" method="post"
                      th:action="${editMode} ? @{/teacher/word-tests/{id}(id=${wordTestId})} : @{/teacher/word-tests}">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <input th:each="course : ${selectedCourses}" type="hidden" name="courseIds" th:value="${course.id()}">
                    <div id="wordFields" class="word-field-list"></div>
                    <div class="word-test-form-actions">
                        <a class="bulk-action bulk-download" href="/teacher/word-tests">취소</a>
                        <button class="bulk-action bulk-upload" type="submit" th:text="${editMode} ? '수정 내용 저장' : '단어시험 저장'">단어시험 저장</button>
                    </div>
                </form>
            </section>
        </main>
    </div>
</div>
<script th:inline="javascript">
    const countInput = document.getElementById('wordCount');
    const fields = document.getElementById('wordFields');
    const savedWords = /*[[${submittedWords}]]*/ null;
    const savedMeanings = /*[[${submittedMeanings}]]*/ null;

    function renderWordFields() {
        const count = Math.min(100, Math.max(1, Number(countInput.value) || 1));
        countInput.value = count;
        const current = Array.from(fields.querySelectorAll('.word-field-row')).map(row => ({
            word: row.querySelector('[name="words"]').value,
            meaning: row.querySelector('[name="meanings"]').value
        }));
        fields.replaceChildren();
        for (let index = 0; index < count; index++) {
            const values = current[index] || {
                word: savedWords && savedWords[index] ? savedWords[index] : '',
                meaning: savedMeanings && savedMeanings[index] ? savedMeanings[index] : ''
            };
            const row = document.createElement('div');
            row.className = 'word-field-row';
            row.innerHTML = `
                <span class="word-number">${index + 1}</span>
                <label><span>영어 단어</span><input name="words" type="text" maxlength="150" required autocomplete="off"></label>
                <label><span>뜻 <small>(선택)</small></span><input name="meanings" type="text" maxlength="300" autocomplete="off"></label>`;
            row.querySelector('[name="words"]').value = values.word;
            row.querySelector('[name="meanings"]').value = values.meaning;
            fields.appendChild(row);
        }
    }

    countInput.addEventListener('input', renderWordFields);
    renderWordFields();
</script>
</body>
</html>
