<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>학생일괄등록 | NaenaeTeacher</title>
    <link rel="stylesheet" href="/assets/css/naenae-dashboard.css">
</head>
<body class="naenae-dashboard-body">
<div class="dashboard-shell">
    <aside th:replace="~{fragments/teacher-sidebar :: sidebar('studentBulk')}"></aside>

    <div class="dashboard-main">
        <header class="dashboard-header">
            <div>
                <p class="header-kicker">Bulk Import</p>
                <h1 class="header-title">학생일괄등록</h1>
            </div>
            <div class="header-actions">
                <form class="logout-form" action="/logout" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button class="logout-button" type="submit" aria-label="로그아웃" title="로그아웃"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 3h10v18H5zM15 6h4v15h-4M11.5 12h.01"/></svg></button>
                </form>
            </div>
        </header>

        <main class="dashboard-content">
            <div class="stack">
                <section class="dashboard-card">
                    <div class="page-toolbar">
                        <div>
                            <h2>엑셀 템플릿</h2>
                            <p>템플릿을 내려받아 첫 줄 헤더를 유지한 상태로 작성하세요.</p>
                        </div>
                        <a class="bulk-action bulk-download" href="/teacher/students/bulk/template">템플릿 다운로드</a>
                    </div>

                    <div class="auth-alert success" th:if="${successMessage}" th:text="${successMessage}">
                        업로드가 완료되었습니다.
                    </div>
                    <div class="auth-alert error" th:if="${errorMessage}" th:text="${errorMessage}">
                        업로드 파일을 확인해 주세요.
                    </div>

                    <div class="bulk-guide">
                        <p>헤더 순서: <strong>학생이름</strong>, <strong>반</strong>, <strong>학교</strong>, <strong>전화번호</strong></p>
                        <p>반은 이미 등록된 반 이름과 정확히 일치해야 합니다.</p>
                    </div>
                </section>

                <section class="dashboard-card">
                    <div class="page-toolbar">
                        <div>
                            <h2>엑셀 업로드</h2>
                            <p>작성한 파일을 업로드하면 행 단위로 학생이 등록됩니다.</p>
                        </div>
                    </div>

                    <form class="bulk-upload-form" action="/teacher/students/bulk/upload" method="post" enctype="multipart/form-data">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <div class="field-group file-field">
                            <input id="file" name="file" type="file" accept=".xlsx" required>
                        </div>
                        <button class="bulk-action bulk-upload" type="submit">업로드</button>
                    </form>
                </section>
            </div>
        </main>
    </div>
</div>
<script src="/assets/js/mobile-navigation.js" defer></script></body>
</html>
