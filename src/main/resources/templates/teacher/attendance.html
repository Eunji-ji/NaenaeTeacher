<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>출석관리 | NaenaeTeacher</title>
    <link rel="stylesheet" href="/assets/css/naenae-dashboard.css">
</head>
<body class="naenae-dashboard-body">
<div class="dashboard-shell">
    <aside class="dashboard-sidebar" aria-label="학생 관리 메뉴">
        <div class="brand">
            <span class="brand-mark">N</span>
            <div>
                <p class="brand-name">이름쌤</p>
                <p class="brand-role">Teacher Space</p>
            </div>
        </div>

        <nav class="sidebar-nav">
            <a class="nav-item" href="/teacher/dashboard"><span class="nav-icon">⌂</span> 대시보드</a>
            <div class="sidebar-section" aria-label="학생관리">
                <div class="sidebar-section-label">학생관리</div>
                <div class="sidebar-subnav">
                    <a class="sidebar-subitem" href="/teacher/courses"><span class="nav-icon">🏷</span> 반등록</a>
                    <a class="sidebar-subitem" href="/teacher/students"><span class="nav-icon">👩‍🎓</span> 학생등록</a>
                    <a class="sidebar-subitem" href="/teacher/students/bulk"><span class="nav-icon">⬇</span> 학생일괄등록</a>
                    <a class="sidebar-subitem active" href="/teacher/attendance"><span class="nav-icon">✓</span> 출석관리</a>
                </div>
            </div>
            <a class="nav-item" href="/teacher/assignments"><span class="nav-icon">✎</span> 과제 관리</a>
            <a class="nav-item" href="/teacher/today-english"><span class="nav-icon">Aa</span> 오늘의 영어</a>
            <a class="nav-item" href="/teacher/notice"><span class="nav-icon">!</span> 알림장</a>
            <a class="nav-item" href="/teacher/board"><span class="nav-icon">#</span> 게시판</a>
            <a class="nav-item" href="/teacher/settings"><span class="nav-icon">⚙</span> 설정</a>
        </nav>
    </aside>

    <div class="dashboard-main">
        <header class="dashboard-header">
            <div>
                <p class="header-kicker">Attendance Management</p>
                <h1 class="header-title">출석관리</h1>
            </div>
            <div class="header-actions">
                <form class="logout-form" action="/logout" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button class="logout-button" type="submit">나가기</button>
                </form>
            </div>
        </header>

        <main class="dashboard-content">
            <div class="stack">
                <section class="dashboard-card">
                    <div class="attendance-toolbar">
                        <form class="attendance-course-form" action="/teacher/attendance" method="get">
                            <select name="courseId" aria-label="반 선택">
                                <option th:each="course : ${attendancePage.courses()}"
                                        th:value="${course.id()}"
                                        th:selected="${attendancePage.selectedCourseId() != null and attendancePage.selectedCourseId() == course.id()}"
                                        th:text="${course.title()}">초등 A반</option>
                            </select>
                            <input type="hidden" name="date" th:value="${#temporals.format(attendancePage.selectedDate(), 'yyyy-MM-dd')}">
                            <button type="submit">조회</button>
                        </form>

                        <div class="attendance-date-nav">
                            <form action="/teacher/attendance" method="get">
                                <input type="hidden" name="courseId" th:value="${attendancePage.selectedCourseId()}">
                                <input type="hidden" name="date" th:value="${#temporals.format(attendancePage.previousDate(), 'yyyy-MM-dd')}">
                                <button type="submit" aria-label="이전 날짜">‹</button>
                            </form>
                            <div class="attendance-date-pill">
                                <p class="attendance-date-kicker">오늘 날짜</p>
                                <h2 th:text="${attendancePage.selectedDateLabel()}">2026년 7월 8일 (수)</h2>
                            </div>
                            <form action="/teacher/attendance" method="get">
                                <input type="hidden" name="courseId" th:value="${attendancePage.selectedCourseId()}">
                                <input type="hidden" name="date" th:value="${#temporals.format(attendancePage.nextDate(), 'yyyy-MM-dd')}">
                                <button type="submit" aria-label="다음 날짜">›</button>
                            </form>
                        </div>
                    </div>

                    <div class="auth-alert error" th:if="${errorMessage}" th:text="${errorMessage}">입력값을 확인해 주세요.</div>
                    <div class="auth-alert success" th:if="${successMessage}" th:text="${successMessage}">저장되었습니다.</div>

                    <div class="empty-state attendance-empty" th:if="${#lists.isEmpty(attendancePage.courses())}">
                        먼저 반등록에서 반을 추가해 주세요.
                    </div>

                    <form th:if="${!#lists.isEmpty(attendancePage.courses())}"
                          class="attendance-save-form"
                          action="/teacher/attendance"
                          method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <input type="hidden" name="courseId" th:value="${attendancePage.selectedCourseId()}">
                        <input type="hidden" name="date" th:value="${#temporals.format(attendancePage.selectedDate(), 'yyyy-MM-dd')}">

                        <div class="table-scroll">
                            <table class="student-table attendance-table">
                                <thead>
                                <tr>
                                    <th>출석</th>
                                    <th>이름</th>
                                    <th>학교</th>
                                    <th>체크 시간</th>
                                </tr>
                                </thead>
                                <tbody>
                                <tr th:if="${#lists.isEmpty(attendancePage.students())}">
                                    <td class="empty-state" colspan="4">등록된 학생이 없습니다.</td>
                                </tr>
                                <tr th:each="student : ${attendancePage.students()}">
                                    <td>
                                        <label class="attendance-check">
                                            <input type="checkbox"
                                                   name="presentStudentIds"
                                                   th:value="${student.studentId()}"
                                                   th:checked="${student.checked()}">
                                            <span></span>
                                        </label>
                                    </td>
                                    <td th:text="${student.studentName()}">김지우</td>
                                    <td th:text="${student.schoolName() ?: '-'}">내곡초</td>
                                    <td th:text="${student.checkedAt() != null ? #temporals.format(student.checkedAt(), 'HH:mm') : '-'}">09:00</td>
                                </tr>
                                </tbody>
                            </table>
                        </div>

                        <div class="attendance-save-row">
                            <button type="submit">출석 저장</button>
                        </div>
                    </form>
                </section>
            </div>
        </main>
    </div>
</div>
</body>
</html>
