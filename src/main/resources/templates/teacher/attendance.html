<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>출석관리 | NaenaeTeacher</title>
    <link rel="stylesheet" href="/assets/css/naenae-dashboard.css">
</head>
<body class="naenae-dashboard-body">
<div class="dashboard-shell">
    <aside th:replace="~{fragments/teacher-sidebar :: sidebar('attendance')}"></aside>

    <div class="dashboard-main">
        <header class="dashboard-header">
            <div>
                <p class="header-kicker">Attendance Management</p>
                <h1 class="header-title">출석관리</h1>
            </div>
            <div class="header-actions">
                <form class="logout-form" action="/logout" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button class="logout-button" type="submit" aria-label="로그아웃" title="로그아웃"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 3h10v18H5zM15 6h4v15h-4M11.5 12h.01"/></svg></button>
                </form>
            </div>
        </header>

        <main class="dashboard-content">
            <div class="stack">
                <section class="dashboard-card">
                    <div class="attendance-toolbar">
                        <div class="attendance-toolbar-left">
                            <form class="attendance-course-form" action="/teacher/attendance" method="get">
                                <select name="courseId" aria-label="반 선택">
                                    <option th:each="course : ${attendancePage.courses()}"
                                            th:value="${course.id()}"
                                            th:selected="${attendancePage.selectedCourseId() != null and attendancePage.selectedCourseId() == course.id()}"
                                            th:text="${course.title()}">초등 A반</option>
                                </select>
                                <input type="hidden" name="date" th:value="${#temporals.format(attendancePage.selectedDate(), 'yyyy-MM-dd')}">
                                <button type="submit">조회</button>
                            </form>
                            <form class="attendance-bulk-form" action="/teacher/attendance/bulk-present" method="post"
                                  th:if="${attendancePage.selectedCourseId() != null}">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                <input type="hidden" name="courseId" th:value="${attendancePage.selectedCourseId()}">
                                <input type="hidden" name="date" th:value="${#temporals.format(attendancePage.selectedDate(), 'yyyy-MM-dd')}">
                                <button class="attendance-bulk-button" type="submit">전체출석</button>
                            </form>
                        </div>

                        <div class="attendance-date-nav">
                            <form action="/teacher/attendance" method="get">
                                <input type="hidden" name="courseId" th:value="${attendancePage.selectedCourseId()}">
                                <input type="hidden" name="date" th:value="${#temporals.format(attendancePage.previousDate(), 'yyyy-MM-dd')}">
                                <button type="submit" aria-label="이전 날짜">‹</button>
                            </form>
                            <div class="attendance-date-pill">
                                <p class="attendance-date-kicker">오늘 날짜</p>
                                <h2 th:text="${attendancePage.selectedDateLabel()}">2026년 7월 8일 (수)</h2>
                            </div>
                            <form action="/teacher/attendance" method="get">
                                <input type="hidden" name="courseId" th:value="${attendancePage.selectedCourseId()}">
                                <input type="hidden" name="date" th:value="${#temporals.format(attendancePage.nextDate(), 'yyyy-MM-dd')}">
                                <button type="submit" aria-label="다음 날짜">›</button>
                            </form>
                        </div>
                    </div>

                    <div class="auth-alert error" th:if="${errorMessage}" th:text="${errorMessage}">입력값을 확인해 주세요.</div>
                    <div class="auth-alert success" th:if="${successMessage}" th:text="${successMessage}">저장되었습니다.</div>

                    <div class="empty-state attendance-empty" th:if="${#lists.isEmpty(attendancePage.courses())}">
                        먼저 반등록에서 반을 추가해 주세요.
                    </div>

                    <div class="table-scroll" th:if="${!#lists.isEmpty(attendancePage.courses())}">
                        <table class="student-table attendance-table">
                            <thead>
                            <tr>
                                <th>이름</th>
                                <th>출결</th>
                                <th>학교</th>
                                <th>기록 시간</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:if="${#lists.isEmpty(attendancePage.students())}">
                                <td class="empty-state" colspan="4">등록된 학생이 없습니다.</td>
                            </tr>
                            <tr th:each="student : ${attendancePage.students()}">
                                <td th:text="${student.studentName()}">김지우</td>
                                <td>
                                    <form class="attendance-row-form" action="/teacher/attendance" method="post">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                        <input type="hidden" name="courseId" th:value="${attendancePage.selectedCourseId()}">
                                        <input type="hidden" name="date" th:value="${#temporals.format(attendancePage.selectedDate(), 'yyyy-MM-dd')}">
                                        <input type="hidden" name="studentId" th:value="${student.studentId()}">
                                        <select name="status"
                                                class="attendance-status-select"
                                                onchange="this.form.submit()">
                                            <option value="" th:selected="${student.status() == null}">상태 선택</option>
                                            <option value="PRESENT" th:selected="${student.status() == 'PRESENT'}">출석</option>
                                            <option value="LATE" th:selected="${student.status() == 'LATE'}">지각</option>
                                            <option value="ABSENT" th:selected="${student.status() == 'ABSENT'}">결석</option>
                                        </select>
                                    </form>
                                </td>
                                <td th:text="${student.schoolName() ?: '-'}">내곡초</td>
                                <td th:text="${student.checkedAt() != null ? #temporals.format(student.checkedAt(), 'HH:mm') : '-'}">09:00</td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </section>
            </div>
        </main>
    </div>
</div>
<script src="/assets/js/mobile-navigation.js" defer></script></body>
</html>
