<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>이번주 테스트 등록 | NaenaeTeacher</title><link rel="stylesheet" href="/assets/css/naenae-dashboard.css"></head>
<body class="naenae-dashboard-body"><div class="dashboard-shell">
<aside th:replace="~{fragments/teacher-sidebar :: sidebar('weeklyTests')}"></aside>
<div class="dashboard-main"><header class="dashboard-header"><div><p class="header-kicker">Register Weekly Test</p><h1 class="header-title">이번주 테스트 등록</h1></div><a class="header-nav-action header-nav-action-secondary" href="/teacher/weekly-tests">목록</a></header>
<main class="dashboard-content"><section class="dashboard-card weekly-test-form-card">
    <div class="page-toolbar"><div><h2>테스트 정보</h2><p>반은 필수이며 테스트명은 저장할 때 자동으로 만들어집니다.</p></div></div>
    <div class="auth-alert error" th:if="${errorMessage}" th:text="${errorMessage}"></div>
    <form action="/teacher/weekly-tests" method="post" enctype="multipart/form-data" class="weekly-test-form">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <div class="field-group"><label for="courseId">테스트 반 <strong class="required-mark">필수</strong></label>
            <select id="courseId" name="courseId" required><option value="">반을 선택해 주세요</option><option th:each="course:${courses}" th:value="${course.id()}" th:text="${course.title()}" th:selected="${course.id()==courseId}">중등1반</option></select>
        </div>
        <div class="field-group"><label for="remarks">비고</label><textarea id="remarks" name="remarks" maxlength="2000" rows="7" th:text="${remarks}" placeholder="테스트 범위나 준비사항을 입력해 주세요."></textarea><span class="field-note">최대 2,000자</span></div>
        <div class="field-group"><label for="attachments">테스트 파일</label><input id="attachments" name="attachments" type="file" multiple><span class="field-note">최대 5개 · 파일당 10MB 이하</span></div>
        <div class="word-test-form-actions"><a class="bulk-action secondary" href="/teacher/weekly-tests">취소</a><button class="bulk-action bulk-upload" type="submit">테스트 저장</button></div>
    </form>
</section></main></div></div><script src="/assets/js/mobile-navigation.js" defer></script></body></html>
