<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>학생 학습관리 | NaenaeTeacher</title>
    <link rel="stylesheet" href="/assets/css/naenae-dashboard.css">
</head>
<body class="naenae-dashboard-body">
<div class="dashboard-shell">
    <aside class="dashboard-sidebar" aria-label="학생 학습관리 메뉴">
        <div class="brand">
            <span class="brand-mark">N</span>
            <div>
                <p class="brand-name" th:text="${teacherDisplayName}">김지우쌤</p>
                <p class="brand-role">Teacher Space</p>
            </div>
        </div>

        <nav class="sidebar-nav">
            <a class="nav-item" href="/teacher/dashboard"><span class="nav-icon">⌂</span> 대시보드</a>
            <div class="sidebar-section" aria-label="학생관리">
                <div class="sidebar-section-label">학생관리</div>
                <div class="sidebar-subnav">
                    <a class="sidebar-subitem" href="/teacher/courses"><span class="nav-icon">🏷</span> 반등록</a>
                    <a class="sidebar-subitem" href="/teacher/students"><span class="nav-icon">👩‍🎓</span> 학생등록</a>
                    <a class="sidebar-subitem" href="/teacher/students/bulk"><span class="nav-icon">⬇</span> 학생일괄등록</a>
                    <a class="sidebar-subitem" href="/teacher/attendance"><span class="nav-icon">✓</span> 출석관리</a>
                    <a class="sidebar-subitem active" href="/teacher/students/status"><span class="nav-icon">▤</span> 학생 학습관리</a>
                </div>
            </div>
            <a class="nav-item" href="/teacher/assignments"><span class="nav-icon">✎</span> 과제 관리</a>
            <a class="nav-item" href="/teacher/today-english"><span class="nav-icon">Aa</span> 오늘의 영어</a>
            <a class="nav-item" href="/teacher/notice"><span class="nav-icon">!</span> 알림장</a>
            <a class="nav-item" href="/teacher/board"><span class="nav-icon">#</span> 게시판</a>
            <a class="nav-item" href="/teacher/settings"><span class="nav-icon">⚙</span> 설정</a>
        </nav>
    </aside>

    <div class="dashboard-main">
        <header class="dashboard-header">
            <div>
                <p class="header-kicker">Student Learning</p>
                <h1 class="header-title">학생 학습관리</h1>
            </div>
            <div class="header-actions">
                <form class="logout-form" action="/logout" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button class="logout-button" type="submit">나가기</button>
                </form>
            </div>
        </header>

        <main class="dashboard-content">
            <div class="stack">
                <section class="dashboard-card">
                    <div class="page-toolbar">
                        <div>
                            <h2>학생 조회</h2>
                            <p>학생 이름을 클릭하면 상세 페이지로 이동합니다.</p>
                            <p th:if="${studentLearningPage.selectedCourseTitle() != null}">
                                현재 반: <strong th:text="${studentLearningPage.selectedCourseTitle()}">초등 A반</strong>
                            </p>
                        </div>
                        <form class="filter-form" action="/teacher/students/status" method="get">
                            <select name="courseId" aria-label="반 선택" onchange="this.form.submit()">
                                <option th:each="course : ${studentLearningPage.courses()}"
                                        th:value="${course.id()}"
                                        th:selected="${studentLearningPage.selectedCourseId() != null and studentLearningPage.selectedCourseId() == course.id()}"
                                        th:text="${course.title()}">초등 A반</option>
                            </select>
                        </form>
                    </div>

                    <div class="empty-state" th:if="${#lists.isEmpty(studentLearningPage.courses())}">
                        먼저 반등록에서 반을 추가해 주세요.
                    </div>

                    <div class="table-scroll" th:if="${!#lists.isEmpty(studentLearningPage.courses())}">
                        <table class="student-table student-learning-table">
                            <thead>
                            <tr>
                                <th>학생명</th>
                                <th>학교</th>
                                <th>전화번호</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:if="${#lists.isEmpty(studentLearningPage.students())}">
                                <td class="empty-state" colspan="3">등록된 학생이 없습니다.</td>
                            </tr>
                            <tr th:each="student : ${studentLearningPage.students()}">
                                <td>
                                    <a class="student-name-link"
                                       th:href="@{/teacher/students/status/{studentId}(studentId=${student.studentId()}, courseId=${studentLearningPage.selectedCourseId()})}"
                                       th:text="${student.studentName()}">김지우</a>
                                </td>
                                <td th:text="${student.schoolName() ?: '-'}">내곡초</td>
                                <td th:text="${student.phone() ?: '-'}">010-0000-0000</td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </section>
            </div>
        </main>
    </div>
</div>
</body>
</html>
