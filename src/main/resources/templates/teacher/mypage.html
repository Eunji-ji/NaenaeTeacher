<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>마이페이지 | NaenaeTeacher</title>
    <link rel="stylesheet" href="/assets/css/naenae-dashboard.css">
</head>
<body class="naenae-dashboard-body">
<div class="dashboard-shell">
    <aside th:replace="~{fragments/teacher-sidebar :: sidebar('mypage')}"></aside>
    <div class="dashboard-main">
        <header class="dashboard-header">
            <div><p class="header-kicker">My Page</p><h1 class="header-title">마이페이지</h1></div>
        </header>
        <main class="dashboard-content">
            <section class="dashboard-card mypage-card">
                <div class="mypage-heading">
                    <div class="mypage-avatar">
                        <img th:if="${profile.hasProfileImage()}" src="/teacher/mypage/profile-image" alt="프로필 사진">
                        <span th:unless="${profile.hasProfileImage()}" th:text="${teacherInitial}">N</span>
                    </div>
                    <div><h2 th:text="|${profile.nickname()}쌤|">닉네임쌤</h2><p th:text="${profile.email()}">email</p></div>
                </div>

                <div class="auth-alert success" th:if="${successMessage}" th:text="${successMessage}"></div>
                <div class="auth-alert error" th:if="${errorMessage}" th:text="${errorMessage}"></div>

                <form action="/teacher/mypage" method="post" enctype="multipart/form-data" class="mypage-form">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <div class="field-group">
                        <label>가입 이름</label>
                        <input type="text" th:value="${profile.name()}" disabled>
                    </div>
                    <div class="field-group">
                        <label for="nickname">닉네임</label>
                        <input id="nickname" name="nickname" type="text" maxlength="100" th:value="${profile.nickname()}" required>
                        <span class="field-note">화면 상단과 작성자 이름에 사용됩니다.</span>
                    </div>
                    <div class="field-group">
                        <label for="invitationCode">학생 초대코드</label>
                        <div class="invitation-code-display">
                            <input id="invitationCode" type="text" th:value="${profile.invitationCode()}" readonly>
                            <button type="button" class="invitation-copy-button"
                                    onclick="navigator.clipboard.writeText(document.getElementById('invitationCode').value); this.textContent='복사됨'">복사</button>
                        </div>
                        <span class="field-note"
                              th:text="|${#temporals.format(profile.invitationCodeExpiresAt(), 'yyyy.MM.dd HH:mm')}까지 · 가입 ${profile.invitationCodeRemainingUses()}회 남음|">
                            만료일과 남은 횟수
                        </span>
                    </div>
                    <div class="field-group">
                        <label for="profileImage">프로필 사진</label>
                        <input id="profileImage" name="profileImage" type="file" accept="image/jpeg,image/png,image/webp">
                        <span class="field-note">JPG, PNG, WEBP · 최대 5MB</span>
                    </div>
                    <div class="word-test-form-actions">
                        <button class="bulk-action bulk-upload" type="submit">프로필 저장</button>
                    </div>
                </form>
                <form action="/teacher/mypage/invitation-code/reissue" method="post" class="invitation-reissue-form"
                      onsubmit="return confirm('새 코드를 발급하면 이전 초대코드는 즉시 사용할 수 없습니다. 재발급할까요?')">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button type="submit">초대코드 재발급</button>
                    <span>코드가 노출되었거나 만료 전에 교체해야 할 때 사용하세요.</span>
                </form>
            </section>
        </main>
    </div>
</div>
<script src="/assets/js/mobile-navigation.js" defer></script>
</body>
</html>
