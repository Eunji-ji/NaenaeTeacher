<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>학생 학습관리 상세 | NaenaeTeacher</title>
    <link rel="stylesheet" href="/assets/css/naenae-dashboard.css">
</head>
<body class="naenae-dashboard-body">
<div class="dashboard-shell">
    <aside th:replace="~{fragments/teacher-sidebar :: sidebar('studentStatus')}"></aside>

    <div class="dashboard-main">
        <header class="dashboard-header">
            <div>
                <p class="header-kicker">Student Learning</p>
                <h1 class="header-title">학생 학습관리 상세</h1>
            </div>
            <div class="header-actions">
                <a class="bulk-action bulk-download" th:href="@{/teacher/students/status(courseId=${selectedCourseId})}">목록으로</a>
                <form class="logout-form" action="/logout" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button class="logout-button" type="submit" aria-label="로그아웃" title="로그아웃"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 3h10v18H5zM15 6h4v15h-4M11.5 12h.01"/></svg></button>
                </form>
            </div>
        </header>

        <main class="dashboard-content">
            <div class="stack">
                <section class="dashboard-card">
                    <div class="page-toolbar">
                        <div>
                            <h2 th:text="${studentLearningDetailPage.studentName()}">김지우</h2>
                            <p>
                                <span th:text="${studentLearningDetailPage.courseTitle()}">초등 A반</span>
                                · <span th:text="${studentLearningDetailPage.schoolName() ?: '-'}">나내초</span>
                                · <span th:text="${studentLearningDetailPage.phone() ?: '-'}">010-0000-0000</span>
                            </p>
                        </div>
                    </div>

                    <div class="auth-alert success" th:if="${successMessage}" th:text="${successMessage}">
                        저장되었습니다.
                    </div>
                    <div class="auth-alert error" th:if="${errorMessage}" th:text="${errorMessage}">
                        입력값을 확인해 주세요.
                    </div>

                    <div class="detail-grid">
                        <section class="detail-panel">
                            <div class="card-header">
                                <h2 class="card-title"><span class="card-icon tone-info">✎</span> 특징 메모</h2>
                                <span class="pill"
                                      th:text="|${studentLearningDetailPage.memoSummary() == null ? 0 : #strings.length(studentLearningDetailPage.memoSummary())}/${studentLearningDetailPage.memoMaxLength()}|">0/4000</span>
                            </div>
                            <form class="student-detail-form" th:action="@{/teacher/students/status/{studentId}(studentId=${studentLearningDetailPage.studentId()})}" method="post">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                <input type="hidden" name="courseId" th:value="${selectedCourseId}">
                                <textarea name="memoSummary"
                                          maxlength="4000"
                                          rows="10"
                                          th:text="${studentLearningDetailPage.memoSummary()}"></textarea>
                                <button type="submit" class="table-action-button">특징 저장</button>
                            </form>
                        </section>

                        <section class="detail-panel">
                            <div class="card-header">
                                <h2 class="card-title"><span class="card-icon tone-success">✓</span> 성적 입력</h2>
                                <span class="pill" th:text="${studentLearningDetailPage.currentYear()}">2026</span>
                            </div>
                            <form class="score-form" th:action="@{/teacher/students/status/{studentId}/score(studentId=${studentLearningDetailPage.studentId()})}" method="post">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                <input type="hidden" name="courseId" th:value="${selectedCourseId}">
                                <div class="field-group">
                                    <label for="examType">시험 종류</label>
                                    <select id="examType" name="examType" required>
                                        <option value="MIDTERM">중간고사</option>
                                        <option value="FINAL">기말고사</option>
                                    </select>
                                </div>
                                <div class="field-group">
                                    <label for="score">성적</label>
                                    <input id="score" name="score" type="number" min="0" max="100" step="1" required>
                                </div>
                                <button type="submit" class="table-action-button">성적 저장</button>
                            </form>

                            <div class="score-delta">
                                <span>변화량</span>
                                <strong th:text="|${studentLearningDetailPage.scoreDelta()}점|">0점</strong>
                            </div>
                        </section>
                    </div>
                </section>

                <section class="dashboard-card">
                    <div class="card-header">
                        <h2 class="card-title"><span class="card-icon tone-warning">▤</span> 성적 표그래프</h2>
                        <span class="pill">중간 / 기말</span>
                    </div>

                    <div class="score-table-chart" th:if="${!#lists.isEmpty(studentLearningDetailPage.scoreTableRows())}">
                        <table class="score-chart-table">
                            <thead>
                            <tr>
                                <th>연도</th>
                                <th>중간</th>
                                <th>기말</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="row : ${studentLearningDetailPage.scoreTableRows()}">
                                <th th:text="${row.examYear()}">2026</th>
                                <td>
                                    <span class="score-table-value"
                                          th:classappend="${row.midtermScore() == null ? ' empty' : ''}"
                                          th:text="${row.midtermScore() == null ? '-' : row.midtermScore()}">92</span>
                                </td>
                                <td>
                                    <span class="score-table-value"
                                          th:classappend="${row.finalScore() == null ? ' empty' : ''}"
                                          th:text="${row.finalScore() == null ? '-' : row.finalScore()}">95</span>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>

                    <div class="empty-state" th:if="${#lists.isEmpty(studentLearningDetailPage.scores())}">
                        저장된 성적이 없습니다.
                    </div>
                </section>
            </div>
        </main>
    </div>
</div>
<script src="/assets/js/mobile-navigation.js" defer></script></body>
</html>
