<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" th:fragment="teacherLayout(title, content)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:replace="${title}">NaenaeTeacher</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="app-body">
<nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom sticky-top">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" th:href="@{/teacher/dashboard}">NaenaeTeacher</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#teacherNavbar"
                aria-controls="teacherNavbar" aria-expanded="false" aria-label="메뉴 열기">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="teacherNavbar">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item"><a class="nav-link active" th:href="@{/teacher/dashboard}">대시보드</a></li>
                <li class="nav-item"><a class="nav-link disabled" href="#">학생</a></li>
                <li class="nav-item"><a class="nav-link disabled" href="#">수업</a></li>
                <li class="nav-item"><a class="nav-link disabled" href="#">과제</a></li>
                <li class="nav-item"><a class="nav-link disabled" href="#">출석</a></li>
            </ul>
            <form th:action="@{/logout}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button class="btn btn-outline-secondary btn-sm" type="submit">로그아웃</button>
            </form>
        </div>
    </div>
</nav>

<div class="container-fluid">
    <div class="row">
        <aside class="col-lg-2 d-none d-lg-block sidebar border-end">
            <div class="list-group list-group-flush py-3">
                <a class="list-group-item list-group-item-action active" th:href="@{/teacher/dashboard}">대시보드</a>
                <span class="list-group-item text-muted">학생 관리</span>
                <span class="list-group-item text-muted">수업 관리</span>
                <span class="list-group-item text-muted">과제 관리</span>
                <span class="list-group-item text-muted">출석 관리</span>
                <span class="list-group-item text-muted">메모</span>
            </div>
        </aside>
        <main class="col-12 col-lg-10 content-area" th:replace="${content}"></main>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
