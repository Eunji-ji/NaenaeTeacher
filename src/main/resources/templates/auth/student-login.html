<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>학생 로그인 | NaenaeTeacher</title>
    <link rel="stylesheet" href="/assets/css/naenae-dashboard.css">
</head>
<body class="naenae-auth-body student-auth-body">
<main class="auth-shell">
    <section class="auth-panel student-auth-panel" aria-label="학생 로그인">
        <div class="auth-intro student-auth-intro">
            <div>
                <div class="brand"><span class="brand-mark">N</span><div><p class="brand-name">나의 학습 공간</p><p class="brand-role">Student Space</p></div></div>
                <h1>오늘 배울 내용을 한곳에서 확인해요.</h1>
                <p>오늘의 영어부터 과제와 알림장까지, 나에게 필요한 학습 내용을 편하게 살펴볼 수 있어요.</p>
                <ul class="auth-feature-list">
                    <li><span class="card-icon tone-info">Aa</span> 내 레벨에 맞는 오늘의 영어</li>
                    <li><span class="card-icon tone-success">✓</span> 진행 중인 과제와 출석 현황</li>
                    <li><span class="card-icon tone-neutral">!</span> 우리 반 알림장과 게시판</li>
                </ul>
            </div>
            <div class="pill">Student</div>
        </div>
        <div class="auth-form-area">
            <p class="auth-kicker">Student Login</p>
            <h2 class="auth-title">학생 로그인</h2>
            <p class="auth-subtitle">학생 계정으로 로그인하면 내 대시보드로 이동합니다.</p>
            <div class="auth-alert error" th:if="${param.error}">이메일 또는 비밀번호를 확인해 주세요.</div>
            <form class="auth-form" action="/auth/login" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <input type="hidden" name="portal" value="student">
                <div class="field-group"><label for="email">이메일</label><input id="email" name="email" type="email" autocomplete="username" required></div>
                <div class="field-group"><label for="password">비밀번호</label><input id="password" name="password" type="password" autocomplete="current-password" required></div>
                <button class="auth-submit" type="submit">학생으로 로그인</button>
            </form>
            <a class="auth-portal-back" href="/">학생·선생님 선택으로 돌아가기</a>
        </div>
    </section>
</main>
</body>
</html>
