<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>선생님 로그인 | NaenaeTeacher</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="auth-body">
<main class="auth-shell">
    <section class="auth-card shadow-sm">
        <p class="text-uppercase text-success fw-bold small mb-2">Teacher Workspace</p>
        <h1 class="h3 fw-bold mb-4">선생님 로그인</h1>

        <div class="alert alert-danger py-2" th:if="${param.error}">
            이메일 또는 비밀번호를 확인해주세요.
        </div>
        <div class="alert alert-success py-2" th:if="${param.logout}">
            로그아웃되었습니다.
        </div>

        <form th:action="@{/teacher/login}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <div class="mb-3">
                <label for="email" class="form-label">이메일</label>
                <input id="email" name="email" type="email" class="form-control" autocomplete="username" required>
            </div>
            <div class="mb-4">
                <label for="password" class="form-label">비밀번호</label>
                <input id="password" name="password" type="password" class="form-control"
                       autocomplete="current-password" required>
            </div>
            <button type="submit" class="btn btn-success w-100">로그인</button>
        </form>
    </section>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
