<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>선생님 로그인 | NaenaeTeacher</title>
    <link rel="stylesheet" href="/assets/css/naenae-dashboard.css">
</head>
<body class="naenae-auth-body">
<main class="auth-shell">
    <section class="auth-panel" aria-label="선생님 로그인">
        <div class="auth-intro">
            <div>
                <div class="brand">
                    <span class="brand-mark">N</span>
                    <div>
                        <p class="brand-name">이름쌤</p>
                        <p class="brand-role">Teacher Space</p>
                    </div>
                </div>
                <h1>오늘 수업 흐름을 한곳에서 관리하세요.</h1>
                <p>학생, 출석, 과제, 알림장을 부드러운 대시보드 UI에서 확인할 수 있습니다.</p>
                <ul class="auth-feature-list">
                    <li><span class="card-icon tone-success">✓</span> 출석과 과제 현황을 빠르게 확인</li>
                    <li><span class="card-icon tone-info">▤</span> 수업 일정과 학생 상태를 한눈에 정리</li>
                    <li><span class="card-icon tone-neutral">✦</span> 오늘의 영어 콘텐츠 관리</li>
                </ul>
            </div>
            <div class="pill">Local MVP</div>
        </div>

        <div class="auth-form-area">
            <p class="auth-kicker">Teacher Login</p>
            <h2 class="auth-title">로그인</h2>
            <p class="auth-subtitle">선생님 계정으로 로그인하면 대시보드로 이동합니다.</p>

            <div class="auth-alert error" th:if="${param.error}">
                이메일 또는 비밀번호를 확인해 주세요.
            </div>
            <div class="auth-alert success" th:if="${param.logout}">
                로그아웃되었습니다.
            </div>
            <div class="auth-alert success" th:if="${signupSuccess}">
                회원가입이 완료되었습니다. 로그인해 주세요.
            </div>

            <form class="auth-form" action="/teacher/login" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <div class="field-group">
                    <label for="email">이메일</label>
                    <input id="email" name="email" type="email" autocomplete="username" required>
                </div>
                <div class="field-group">
                    <label for="password">비밀번호</label>
                    <input id="password" name="password" type="password" autocomplete="current-password" required>
                </div>
                <button class="auth-submit" type="submit">로그인</button>
            </form>

            <div class="auth-link-row">
                <span>아직 계정이 없나요?</span>
                <a href="/teacher/signup">회원가입</a>
            </div>
        </div>
    </section>
</main>
</body>
</html>
