server:
  port: ${PORT:8081}
  address: 0.0.0.0
  forward-headers-strategy: native
  shutdown: graceful

spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:5}
      minimum-idle: ${DB_POOL_MIN_IDLE:1}
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never
      probes:
        enabled: true

logging:
  level:
    org.hibernate.SQL: warn
    org.hibernate.orm.jdbc.bind: warn

app:
  jwt:
    secret: ${JWT_SECRET}
  storage:
    assignment-dir: ${ASSIGNMENT_STORAGE_DIR:/var/lib/naenae-teacher/uploads/assignments}
    notice-dir: ${NOTICE_STORAGE_DIR:/var/lib/naenae-teacher/uploads/notices}
    board-dir: ${BOARD_STORAGE_DIR:/var/lib/naenae-teacher/uploads/board}
    profile-dir: ${PROFILE_STORAGE_DIR:/var/lib/naenae-teacher/uploads/profiles}
    weekly-test-dir: ${WEEKLY_TEST_STORAGE_DIR:/var/lib/naenae-teacher/uploads/weekly-tests}
