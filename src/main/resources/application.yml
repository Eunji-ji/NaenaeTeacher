spring:
  application:
    name: naenae-teacher
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:pc1}
    group:
      pc1: local
      pc2: local

server:
  port: ${PORT:8081}
  address: 0.0.0.0

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  swagger-ui:
    path: /swagger-ui.html

app:
  jwt:
    secret: ${JWT_SECRET:}
