spring:
  application:
    name: naenae-teacher
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:pc1}
    group:
      pc1: local
      pc2: local

server:
  port: ${PORT:8081}
  address: 0.0.0.0

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  swagger-ui:
    path: /swagger-ui.html

app:
  jwt:
    secret: ${JWT_SECRET:}
  security:
    invitation-code:
      valid-days: ${INVITATION_CODE_VALID_DAYS:30}
      max-uses: ${INVITATION_CODE_MAX_USES:100}
    signup-rate-limit:
      lookup-per-minute: ${SIGNUP_LOOKUP_LIMIT_PER_MINUTE:30}
      signup-per-ten-minutes: ${SIGNUP_LIMIT_PER_TEN_MINUTES:10}
  legal:
    service-name: ${SERVICE_NAME:NaenaeTeacher}
    operator-name: ${SERVICE_OPERATOR_NAME:NaenaeTeacher 운영자}
    contact-email: ${PRIVACY_CONTACT_EMAIL:support@example.invalid}
