services:
  postgres:
    image: postgres:16
    container_name: naenae-teacher-postgres
    environment:
      POSTGRES_DB: naenae_teacher
      POSTGRES_USER: naenae
      POSTGRES_PASSWORD: naenae1234
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
